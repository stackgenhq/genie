# Genie Configuration Example

[model_config]
# Configuration for the model provider
# Multiple providers can be configured, each optimized for different task types

# OpenAI model for efficiency tasks (GPT-5 series, latest as of Feb 2026)
[[model_config.providers]]
provider = "openai"
model_name = "gpt-5.2"
token = "${OPENAI_API_KEY}"
good_for_task = "tool_calling"


# Gemini model for tool calling tasks (Gemini 3 Flash, latest as of Dec 2025)
[[model_config.providers]]
provider = "gemini"
model_name = "gemini-3-pro-preview"
token = "${GEMINI_API_KEY}"  # Optional: defaults to GEMINI_API_KEY or GOOGLE_API_KEY env var
good_for_task = "novel_reasoning"

# # Gemini model for efficiency tasks (Gemini 3 Pro, latest as of Nov 2025)
# [[model_config.providers]]
# provider = "gemini"
# model_name = "gemini-3-flash-preview"
# token = "${GEMINI_API_KEY}"  # Optional: defaults to GEMINI_API_KEY or GOOGLE_API_KEY env var
# good_for_task = "planning"

# Anthropic model for novel reasoning tasks (Claude Opus 4.5, latest as of Nov 2025)
[[model_config.providers]]
provider = "anthropic"
model_name = "claude-opus-4-5-20251101"
token = "${ANTHROPIC_API_KEY}"  # Optional: defaults to GEMINI_API_KEY or GOOGLE_API_KEY env var
good_for_task = "planning"


[architect]

[ops]
# Maximum number of pages to process
max_pages = 5
# Enable verification steps after IaC generation
enable_verification = true
# Maximum number of verification retries
max_verification_runs = 3

[secops]
scanner = "snyk" # or "trivy"

[secops.severity_thresholds]
# Security violation thresholds. If violations exceed these counts, the check fails.
high = 0
medium = 42
low = -1
