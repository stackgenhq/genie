apiVersion: v1
kind: ConfigMap
metadata:
  name: genie-config
  namespace: default
data:
  genie.toml: |
    # Place your genie.toml configuration here
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: genie-deployment
  namespace: default
  labels:
    app: genie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genie
  template:
    metadata:
      labels:
        app: genie
    spec:
      containers:
        - name: genie
          image: ghcr.io/stackgenhq/genie:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080 # Update this to the correct port Genie listens on
          volumeMounts:
            - name: config-volume
              mountPath: /app/genie.toml # Update to correct expected path
              subPath: genie.toml
      volumes:
        - name: config-volume
          configMap:
            name: genie-config
---
apiVersion: v1
kind: Service
metadata:
  name: genie-service
  namespace: default
spec:
  selector:
    app: genie
  ports:
    - protocol: TCP
      port: 80 # The port exposed by the service
      targetPort: 8080 # The port the container listens on
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: genie-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: genie.local # Update this to your desired hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: genie-service
                port:
                  number: 80
