# ── Application Settings ────────────────────────────────────────────────────

[ops]
max_pages = 5
enable_verification = true
max_verification_runs = 3

[scm]
provider = "github"
token = "${GITHUB_TOKEN}"

[vector_memory]
embedding_provider = "ollama"
ollama_url = "http://localhost:11434"
ollama_model = "nomic-embed-text"
persistence_dir = "${PWD}/.genie/vector_store"

# ── AG-UI Server ────────────────────────────────────────────────────────────
[messenger.agui]
port = 9876
cors_origins = ["https://stackgenhq.github.io", "http://localhost:8123"]

# ── Authentication ──────────────────────────────────────────────────────────
# When deployed to the cloud, Genie MUST be password-protected at minimum.
# The password is resolved in order: config → AGUI_PASSWORD env var → auto-generate.
# For production, prefer JWT/OIDC or API keys.

[messenger.agui.auth.password]
enabled = true
# value is injected via the AGUI_PASSWORD env var from the K8s Secret.

# To allow machine-to-machine scripts, use API keys via Authorization: Bearer <key>
# [messenger.agui.auth.api_keys]
# keys = ["static-token-1", "static-token-2"]

# To use JWT/OIDC instead (or in addition), uncomment the section below:
# [messenger.agui.auth.jwt]
# trusted_issuers = [
#   "https://accounts.google.com",
#   # "https://login.microsoftonline.com/{tenant-id}/v2.0",
#   # "https://dev-12345.okta.com/oauth2/default",
# ]
# allowed_audiences = ["your-client-id"]

# To enable browser Single Sign-On (Okta, Google, Auth0, AzureAD):
# [messenger.agui.auth.oidc]
# issuer_url = "https://accounts.google.com"  # e.g. "https://tenant.okta.com"
# client_id = "YOUR_CLIENT_ID"
# client_secret = "YOUR_CLIENT_SECRET"
# allowed_domains = ["yourcompany.com"]
# redirect_url = "https://genie.yourcompany.com/auth/callback"

[hitl]
always_allowed = []

# ── PII Redaction ────────────────────────────────────────────────────────────
[pii]
entropy_threshold = 4.8
min_secret_length = 16

[[pii.safe_regexes]]
name = "aws_arn"
pattern = '(?i)arn:aws:[a-z0-9-]+:[a-z0-9-]*:[0-9]{12}:[a-zA-Z0-9-/_]+'

[[pii.safe_regexes]]
name = "aws_resource_id"
pattern = '(?i)(i|vol|snap|ami|subnet|vpc|igw|nat|eni|sg|rtb|eipalloc)-[0-9a-f]{8,17}'

[[pii.safe_regexes]]
name = "kubernetes_version"
pattern = '(?i)\bv?[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?\b'

[[pii.safe_regexes]]
name = "cloud_resource_type"
pattern = '(?i)\b(VirtualMachines|VMScaleSets|virtualNetworks|storageAccounts|containerRegistries|aksCluster|managedClusters|networkSecurityGroups|publicIPAddresses|loadBalancers|keyVaults|disks|snapshots|networkInterfaces)\b'

[[pii.safe_regexes]]
name = "provisioning_state"
pattern = '(?i)\b(Succeeded|Failed|Creating|Updating|Deleting|Canceled|InProgress|Registered|NotRegistered)\b'
