# ─────────────────────────────────────────────────────────────────────────────
# Genie Configuration Template
# ─────────────────────────────────────────────────────────────────────────────
# Customize this file for your deployment. Environment variables referenced
# as ${VAR_NAME} are injected via the K8s Secret "genie-secrets" (populated
# by the ExternalSecret from AWS Secrets Manager).
#
# See: https://github.com/stackgenhq/genie/tree/main/examples/devops-copilot
# ─────────────────────────────────────────────────────────────────────────────

skills_roots = ["./skills"]
agent_name = "devops-in-cloud"

[persona]
file = "./AGENTS.md"
disable_resume = true

[db_config]
db_file = "${PWD}/.genie.db"

# ── Model Configuration ─────────────────────────────────────────────────────
[model_config]

[[model_config.providers]]
provider = "gemini"
model_name = "gemini-3-flash-preview"
token = "${GEMINI_API_KEY}"
good_for_task = "tool_calling"

[[model_config.providers]]
provider = "gemini"
model_name = "gemini-3-pro-preview"
token = "${GEMINI_API_KEY}"
good_for_task = "summarizer"

[[model_config.providers]]
provider = "gemini"
model_name = "gemini-3-flash-preview"
token = "${GEMINI_API_KEY}"
good_for_task = "frontdesk"

[[model_config.providers]]
provider = "openai"
model_name = "gpt-5-mini"
token = "${OPENAI_API_KEY}"
good_for_task = "general_task"

# ── Efficiency models (used by halguard for cross-model verification) ────────

[[model_config.providers]]
provider = "openai"
model_name = "gpt-5-nano"
token = "${OPENAI_API_KEY}"
good_for_task = "efficiency"

[[model_config.providers]]
provider = "gemini"
model_name = "gemini-2.0-flash"
token = "${GEMINI_API_KEY}"
good_for_task = "efficiency"

[[model_config.providers]]
provider = "gemini"
model_name = "gemini-3-flash-preview"
token = "${GEMINI_API_KEY}"
good_for_task = "efficiency"

# ── Hallucination Guard ──────────────────────────────────────────────────────
[halguard]
enable_pre_check = true
enable_post_check = true
pre_check_threshold = 0.4
cross_model_samples = 3

# ── MCP Servers ──────────────────────────────────────────────────────────────
# Each MCP server gives Genie structured access to a platform.
# Uncomment/add sections for the tools you need.
[mcp]

# Grafana: dashboards, alerts, datasources, explore queries
[[mcp.servers]]
name = "grafana"
transport = "stdio"
command = "npx"
args = ["-y", "@anthropic/grafana-mcp-server"]
env = { GRAFANA_URL = "${GRAFANA_URL}", GRAFANA_API_KEY = "${GRAFANA_API_KEY}" }

# GitHub: repos, PRs, issues, actions, code search
[[mcp.servers]]
name = "github"
transport = "stdio"
command = "npx"
args = ["-y", "@anthropic/github-mcp-server"]
env = { GITHUB_TOKEN = "${GITHUB_TOKEN}" }

# Terraform: validate, plan, state inspection
[[mcp.servers]]
name = "terraform"
transport = "stdio"
command = "npx"
args = ["-y", "@anthropic/terraform-mcp-server"]

