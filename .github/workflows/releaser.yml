name: goreleaser

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

# Top-level read-only; release job gets write below (Token-Permissions / Scorecard).
permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # contents: write required to create releases and push artifacts (Token-Permissions / Scorecard).
    # attestations: write required for build provenance (Signed-Releases / Scorecard).
    permissions:
      contents: write
      id-token: write
      attestations: write
    container:
      # Pinned by digest for supply-chain security (Code Scanning / Pinned-Dependencies).
      image: goreleaser/goreleaser-cross@sha256:1e9415eb6fb00dbbd44467419862787671371847da460bc5c4967b56c489425c
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            /root/go/pkg/mod
            /root/.cache/go-build
          key: go-${{ runner.arch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.arch }}-
      - name: Setup Repo
        uses: ./.github/actions/setup
      - name: Install quill
        run: |
          QUILL_VERSION="0.5.1"
          curl -sSfL "https://github.com/anchore/quill/releases/download/v${QUILL_VERSION}/quill_${QUILL_VERSION}_linux_amd64.tar.gz" -o /tmp/quill.tar.gz
          tar -xzf /tmp/quill.tar.gz -C /tmp
          install "$(find /tmp -name quill -type f | head -1)" /usr/local/bin/quill
          chmod +x /usr/local/bin/quill
          rm -rf /tmp/quill.tar.gz /tmp/quill*
          quill --version
      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: "v2.2.4"
          install-dir: /usr/local/bin
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      - name: Configure Git for GoReleaser
        run: git config --global --add safe.directory '*'
      - name: Run GoReleaser
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-rc.')
        env:
          BUCKET: ${{ secrets.BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUILL_SIGN_P12: ${{ secrets.QUILL_SIGN_P12 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.QUILL_SIGN_PASSWORD }}
          BREW_TOKEN: ${{ secrets.BREW_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: goreleaser release --clean
      - name: Run GoReleaser (on rc tag)
        if: startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-rc.')
        env:
          BUCKET: ${{ secrets.BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUILL_SIGN_P12: ${{ secrets.QUILL_SIGN_P12 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.QUILL_SIGN_PASSWORD }}
          BREW_TOKEN: ${{ secrets.BREW_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: goreleaser release --clean --config ./goreleaser-beta.yaml
      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-checksums: ./dist/checksums.txt
