name: goreleaser

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    container:
      image: goreleaser/goreleaser-cross:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            /root/go/pkg/mod
            /root/.cache/go-build
          key: go-${{ runner.arch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.arch }}-
      - name: Setup Repo
        uses: ./.github/actions/setup
      - name: Install quill
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/quill/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      - name: Configure Git for GoReleaser
        run: git config --global --add safe.directory '*'
      - name: Run GoReleaser
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-rc.')
        env:
          BUCKET: ${{ secrets.BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUILL_SIGN_P12: ${{ secrets.QUILL_SIGN_P12 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.QUILL_SIGN_PASSWORD }}
          BREW_TOKEN: ${{ secrets.BREW_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: goreleaser release --clean
      - name: Run GoReleaser (on rc tag)
        if: startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-rc.')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUILL_SIGN_P12: ${{ secrets.QUILL_SIGN_P12 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.QUILL_SIGN_PASSWORD }}
          BREW_TOKEN: ${{ secrets.BREW_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: goreleaser release --clean --config ./goreleaser-beta.yaml
