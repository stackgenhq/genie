name: goreleaser

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

permissions:
  contents: write
  id-token: write
env:
  BUCKET: "appcd-public-releases"
  AWS_REGION: "us-east-2"
  AWS_ROLE_ARN: "arn:aws:iam::584974133937:role/GitHubActionsRole"

jobs:
  goreleaser:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Repo
        uses: ./.github/actions/setup
        with:
          GO_LIB_TOKEN: ${{ secrets.GO_LIB_TOKEN }}
      - name: Install quill
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/quill/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-rc.')
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUILL_SIGN_P12: ${{ secrets.QUILL_SIGN_P12 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.QUILL_SIGN_PASSWORD }}
          BREW_TOKEN: ${{ secrets.BREW_TOKEN }}
          FF_UNLEASH_API_KEY: ${{ secrets.FF_UNLEASH_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      - name: Run GoReleaser (on rc tag)
        uses: goreleaser/goreleaser-action@v6
        if: startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-rc.')
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --config ./goreleaser-main.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUILL_SIGN_P12: ${{ secrets.QUILL_SIGN_P12 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.QUILL_SIGN_PASSWORD }}
          BREW_TOKEN: ${{ secrets.BREW_TOKEN }}
          FF_UNLEASH_API_KEY: ${{ secrets.FF_UNLEASH_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
