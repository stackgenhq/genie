agent_name = "Genie"
skills_roots = ["./skills"]

[model_config]

[[model_config.providers]]
provider = "openai"
model_name = "gpt-4o"
variant = "default"
token = "${OPENAI_API_KEY}"
good_for_task = "efficiency"

[vector_memory]
embedding_provider = "ollama"
ollama_url = "http://localhost:11434"
ollama_model = "nomic-embed-text"
vector_store_provider = "inmemory"

[messenger]
platform = "agui"
buffer_size = 0
[messenger.agui]
cors_origins = ["*"]
port = 9876
rate_limit = 30.0
rate_burst = 60
max_concurrent = 5
max_body_bytes = 1048576

[hitl]
approval_ttl = "0s"
cache_ttl = "0s"

[data_sources]
sync_interval = "0s"

[pii]
entropy_threshold = 4.2
min_secret_length = 12

[toolwrap]
[toolwrap.timeout]
default = "0s"
[toolwrap.rate_limit]
[toolwrap.retry]
initial_backoff = "0s"
max_backoff = "0s"
[toolwrap.concurrency]
