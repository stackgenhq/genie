# ── Application Settings ────────────────────────────────────────────

[ops]
max_pages = 5
enable_verification = true
max_verification_runs = 3

# ── GitHub (SCM) ────────────────────────────────────────────────────
[scm]
provider = "github"
token = "${GITHUB_TOKEN}"

# ── Vector Memory ───────────────────────────────────────────────────
[vector_memory]
embedding_provider = "ollama"
ollama_url = "http://localhost:11434"
ollama_model = "nomic-embed-text"
persistence_dir = "${PWD}/.genie/vector_store"

# ── AG-UI Server ────────────────────────────────────────────────────
[messenger.agui]
port = 9876
cors_origins = ["https://stackgenhq.github.io", "http://localhost:8123"]

[hitl]
always_allowed = ["run_shell"]

# ── PII Redaction ───────────────────────────────────────────────────
# Use SafeRegexes to prevent AWS specific IDs, ARNs, and Profiles from
# being obscured, while still allowing emails to be redacted.
[pii]
[[pii.safe_regexes]]
name = "aws_profile"
pattern = '\b[0-9]{12}_[A-Za-z0-9_-]+\b'

[[pii.safe_regexes]]
name = "aws_arn"
pattern = '(?i)arn:aws:[a-z0-9-]+:[a-z0-9-]*:[0-9]{12}:[a-zA-Z0-9-/_]+'

[[pii.safe_regexes]]
name = "aws_resource_id"
pattern = '(?i)(i|vol|snap|ami|subnet|vpc|igw|nat|eni|sg|rtb|eipalloc)-[0-9a-f]{8,17}'

[[pii.safe_regexes]]
name = "s3_bucket"
pattern = '(?i)[a-z0-9.-]+\.s3\.[a-z0-9-]+\.amazonaws\.com'
