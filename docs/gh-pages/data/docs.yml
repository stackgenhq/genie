# TAB 3: ARCHITECTURE
# ═══════════════════════════════════════════════════════════
architecture:
  title: Architecture & Internals

  event_pipeline:
    title: Event Pipeline
    desc: "The TUI communicates with the agent through a two-stage event pipeline:"
    diagram: |
      ┌───────────────┐     ┌──────────────┐     ┌──────────────┐     ┌───────┐
      │ Agent / Expert│────▶│ rawEventChan │────▶│ EventAdapter │────▶│ Model │
      │ (grant.go)    │     │ (chan iface{})│     │ (goroutine)  │     │(Update)│
      └───────────────┘     └──────────────┘     └──────────────┘     └───────┘
                                                                          │
                                                                  ┌───────┴───────┐
                                                                  │   ChatView    │
                                                                  │  (completed)  │
                                                                  └───────────────┘

  channels:
    title: Key Channels
    columns: [Channel, Direction, Purpose]
    rows:
      - ["rawEventChan", "Agent → Adapter", "Raw events (event.Event, AgentChatMessage)"]
      - ["tuiEventChan", "Adapter → Model", "Converted TUI messages"]
      - ["inputChan", "Model → Agent", "User chat input"]

  debugging:
    title: Debugging Scenarios
    items:
      - title: No output in chat window
        steps:
          - "Check that `Model.Update` calls `waitForEvent(m.eventChan)`"
          - "Check `EventAdapter.ConvertEvent()` output"
          - "Verify `chatView.AppendToLastMessage()` execution"
      - title: Tool cards stuck on ⟳
        steps:
          - "Verify `EventAdapter` converts tool response events"
          - "Check `Model.Update` routes response to `chatView.UpdateToolCall()`"
          - "Verify `ToolCallID` matches between call and response"

  footer_note: "For full details, see `pkg/tui/Agents.md` in the repository."

# ═══════════════════════════════════════════════════════════
# TAB 4: FAQ
# ═══════════════════════════════════════════════════════════
faq:
  - q: Which AI providers does Genie support?
    a: >
      Genie supports <strong>OpenAI</strong> (including Azure-hosted), <strong>Google Gemini</strong>,
      and <strong>Anthropic Claude</strong>. Set the <code>provider</code> field in
      <code>[[model_config]]</code> to <code>openai</code>, <code>gemini</code>, or
      <code>anthropic</code>. For Azure OpenAI, set <code>variant = "azure"</code>.

  - q: Can I use multiple models at once?
    a: >
      Yes! Genie is designed for multi-model routing. Add multiple <code>[[model_config]]</code>
      blocks, each with a different <code>good_for_task</code> value (<code>planning</code>,
      <code>tool_calling</code>, <code>efficiency</code>, <code>scientific_reasoning</code>). Genie
      automatically routes each stage of execution to the best-suited model.

  - q: How do I keep API keys out of my config file?
    a: >
      Use the <code>${ENV_VAR}</code> syntax in your config. For example:
      <code>token = "${OPENAI_API_KEY}"</code>. Genie automatically expands environment variables at
      load time. You can load a <code>.env</code> file before running:
      <code>set -a && source .env && set +a</code>.

  - q: What's the difference between Skills and MCP?
    a: >
      <strong>Skills</strong> are self-contained capability packs (markdown + optional scripts)
      following the <a href="https://agentskills.io" target="_blank"
      class="text-purple-500">agentskills.io</a> spec. They live in local directories or remote
      URLs and teach Genie new tasks.<br><br>
      <strong>MCP</strong> (Model Context Protocol) connects Genie to external tool servers — either
      local processes via <code>stdio</code> or remote servers via
      <code>streamable_http</code>/<code>sse</code>. MCP tools are discovered dynamically at runtime
      and extend Genie's toolbox.

  - q: Does Genie work in CI/CD pipelines?
    a: >
      Yes. Use the Docker image: <code>ghcr.io/stackgenhq/genie:latest</code>. Mount your config file
      and workspace as volumes. Pass API keys via environment variables. The Docker container is ideal
      for GitHub Actions, GitLab CI, Jenkins, and Kubernetes Jobs.

  - q: How do I connect Slack, Discord, or Teams?
    a: >
      Add a <code>[messenger]</code> section to your <code>.genie.toml</code> with
      <code>platform</code> set to <code>slack</code>, <code>discord</code>, <code>telegram</code>,
      <code>teams</code>, <code>googlechat</code>, or <code>whatsapp</code>. Then add the
      platform-specific credentials block (e.g. <code>[messenger.slack]</code> with
      <code>app_token</code> and <code>bot_token</code>). See the Configuration tab for all keys.

  - q: Where does Genie store vector memory?
    a: >
      By default, vector memory is in-memory only and lost when Genie exits. To persist it, set
      <code>persistence_dir</code> to a path on disk. Embeddings can be computed via OpenAI
      (<code>embedding_provider = "openai"</code>) or locally via Ollama
      (<code>embedding_provider = "ollama"</code>). Set <code>embedding_provider = "dummy"</code> to
      disable memory entirely.

  - q: What is <code>good_for_task</code> and how does model routing work?
    a: >
      <code>good_for_task</code> tells Genie what each model excels at. Values include
      <code>planning</code> (deep reasoning), <code>tool_calling</code> (function calling),
      <code>efficiency</code> (fast/cheap tasks), and <code>scientific_reasoning</code>. Genie's
      ReAcTree engine routes each execution stage to the model best suited for that stage, giving you
      the quality of the best model and the speed of the fastest.

  - q: Can I run Genie in Docker?
    a: >
      Yes. Pull the official image: <code>docker pull ghcr.io/stackgenhq/genie:latest</code>. Mount
      your config and workspace as volumes:<br><br>
      <code>docker run --rm -it -v ~/.genie.toml:/root/.genie.toml -v $(pwd):/workspace ghcr.io/stackgenhq/genie:latest grant</code><br><br>
      Pass secrets via <code>-e</code> flags (e.g. <code>-e OPENAI_API_KEY=sk-...</code>) and use
      <code>${ENV_VAR}</code> in your config.

  - q: How do I enable security scanning?
    a: >
      Security scanning via the SecOps agent is enabled by default using <strong>Trivy</strong> (free,
      no account needed). Configure it with the <code>[secops]</code> section. Set
      <code>scanner = "snyk"</code> if you prefer Snyk (requires an account). Use
      <code>severity_thresholds</code> to define how many HIGH, MEDIUM, or LOW issues are acceptable.
      Set a threshold to <code>0</code> for zero tolerance, or <code>-1</code> to ignore that severity
      level.

