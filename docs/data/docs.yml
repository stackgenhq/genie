  - id: db_config
    icon: "🗄️"
    name: db_config
    sidebar_desc: Database Storage
    detail_title: "🗄️ db_config"
    detail_desc: >
      <strong>Persistent Local Storage.</strong><br>
      Genie uses a local SQLite database to store HITL approvals, conversation memory, cron task state,
      session history, and clarification records. WAL mode is enabled for concurrent read/write performance.<br><br>
      By default the database is created at <code>~/.genie/genie.db</code>. Override this path if you need
      a project-specific or team-shared database location.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["db_file", "string", "`~/.genie/genie.db`", "Path to the SQLite database file. Parent directories are created automatically."]
    code_example:
      label: Example TOML
      code: |
        [db_config]
        db_file = "/var/lib/genie/production.db"

  - id: email
    icon: "📧"
    name: email
    sidebar_desc: Email Integration
    detail_title: "📧 email"
    detail_desc: >
      <strong>Communication Gateway.</strong><br>
      Enable Genie to send and receive emails via SMTP/IMAP. This can be used for checking automated reports,
      sending notifications, or even processing tasks via email.<br><br>
      Currently supports basic SMTP for sending and IMAP for reading.
    tables:
