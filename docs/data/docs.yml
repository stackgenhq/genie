config_sections:
  - id: agent
    icon: "🧞"
    name: agent
    sidebar_desc: Agent Identity & Persona
    detail_title: "🧞 agent"
    detail_desc: >
      <strong>Agent Identity & Coding Standards.</strong><br>
      Configure Genie's identity and persona. The <code>agent_name</code> gives your agent a personality,
      controls the default audit log path (<code>~/.genie/{agent_name}.&lt;yyyy_mm_dd&gt;.ndjson</code>),
      and is displayed in the chat UI header and <code>/health</code> endpoint.<br><br>
      Optionally load project-level coding standards from a custom file with <code>persona_file</code>. If
      <code>persona_file</code> is not set, no additional persona or coding-standards file is loaded.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["agent_name", "string", "`Genie`", "Name of your agent. Set during `genie setup`; gives the agent a personality and controls the default audit log path. Displayed in the chat UI and `/health` endpoint."]
          - ["persona_file", "string", "—", "Optional path to a file whose contents are appended to the agent's system prompt as project-level coding standards. Supports absolute paths or paths relative to the working directory. If not set, no persona file is loaded by default."]
    code_example:
      label: Example TOML
      code: |
        agent_name = "Jarvis"
        persona_file = "./STANDARDS.md"

  - id: model_config
    icon: "🤖"
    name: model_config
    sidebar_desc: Brain Power & Routing
    detail_title: "🤖 model_config"
    detail_desc: >
      <strong>The Brains of the Operation.</strong><br>
      Genie isn't tied to a single AI model. Instead, it uses a <strong>Multi-Model Routing</strong> strategy to assign
      the best brain for each specific task. For example, it might use a reasoning-heavy model like <em>o3</em> for
      complex planning, a fast model like <em>Gemini Flash</em> for tool calling, and a coding specialist like
      <em>Claude Sonnet</em> for writing software.<br><br>
      Configure multiple providers here to give Genie a diverse set of capabilities.<br><br>
      <strong>Token Tailoring</strong> is enabled by default — conversation history is automatically trimmed to
      fit the model's context window for efficiency (based on
      <a href="https://arxiv.org/abs/2601.14192" target="_blank" class="text-purple-500 hover:text-purple-600">arXiv:2601.14192</a>).
      Set <code>enable_token_tailoring = false</code> on individual providers to disable.
    tables:
      - columns: [Key, Type, Description]
        rows:
          - ["provider", "string", "AI provider — `openai`, `gemini`, `anthropic`, `ollama`, `huggingface`"]
          - ["model_name", "string", "Specific model, e.g. `gpt-5.2`, `gemini-3-flash`, `deepseek-chat`"]
          - ["variant", "string", "Provider variant: `openai` (default), `hunyuan`, `deepseek`, `qwen`, or `azure`"]
          - ["token", "string", "API key — use `${OPENAI_API_KEY}` to read from environment"]
          - ["host", "string", "Base URL for self-hosted or compatible APIs (Ollama, OpenAI, HuggingFace)"]
          - ["good_for_task", "string", "What this model excels at: `planning`, `tool_calling`, `efficiency`, `scientific_reasoning`"]
          - ["enable_token_tailoring", "bool", "When `true` (default), trims conversation history to the model's context window for efficiency. Set to `false` to disable (e.g. debugging or when the provider handles context itself)."]
    subsections:
      - label: Where to get API keys
        columns: [Provider, URL]
        rows:
          - ["Anthropic (Claude)", "<a href=\"https://platform.claude.com/settings/keys\" target=\"_blank\" class=\"text-purple-500 hover:text-purple-600\">platform.claude.com/settings/keys</a>"]
          - ["Google (Gemini)", "<a href=\"https://aistudio.google.com/api-keys\" target=\"_blank\" class=\"text-purple-500 hover:text-purple-600\">aistudio.google.com/api-keys</a>"]
          - ["OpenAI (ChatGPT)", "<a href=\"https://platform.openai.com/api-keys\" target=\"_blank\" class=\"text-purple-500 hover:text-purple-600\">platform.openai.com/api-keys</a>"]

  - id: agui
    icon: "🖥️"
    name: agui
    sidebar_desc: Web UI Server
    detail_title: "🖥️ agui"
    detail_desc: >
      <strong>The Web Interface Server.</strong><br>
      The AG-UI (Agent UI) server provides the HTTP API and SSE (Server-Sent Events) stream that powers Genie's
      frontend. It handles incoming requests, manages concurrency, applies rate limits to prevent abuse, and
      streams real-time events back to the browser. When the chat UI connects, it fetches <code>GET /api/v1/resume</code>
      and <code>GET /api/v1/capabilities</code> to show the agent resume and a collapsible “What Genie can do” panel
      (available tools, auto-approved, and blocked tools).<br><br>
      This is essential if you are running Genie as a shared service for your team.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["port", "int", "`9876`", "Port to listen on"]
          - ["cors_origins", "string[]", '`["https://stackgenhq.github.io"]`', "Allowed CORS origins for the web UI"]
          - ["rate_limit", "float", "`0.5`", "Requests per second limit per IP"]
          - ["rate_burst", "int", "`3`", "Burst request allowance"]
          - ["max_concurrent", "int", "`5`", "Max concurrent requests processing"]
          - ["max_body_bytes", "int", "`1048576`", "Max request body size in bytes (1MB)"]



  - id: skills_roots
    icon: "🎯"
    name: skills_roots
    sidebar_desc: Teaching Genie New Tricks
    detail_title: "🎯 skills_roots"
    detail_desc: >
      <strong>Teach Genie New Tricks.</strong><br>
      Skills are modular capability packs that extend what Genie can do. They follow the
      <a href="https://agentskills.io" target="_blank" class="text-purple-500 hover:text-purple-600">agentskills.io</a>
      specification. A skill can be anything from a set of new tools (like "AWS Management" or "Kubernetes Control")
      to specialized knowledge bases.<br><br>
      Point <code>skills_roots</code> to local directories or Git repositories containing standard skill definitions.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["skills_roots", "string[]", '`["./skills"]`', "Directories or HTTPS URLs containing skill definitions"]

  - id: mcp
    icon: "🔌"
    name: mcp
    sidebar_desc: Connecting External Tools
    detail_title: "🔌 mcp"
    detail_desc: >
      <strong>Universal Tool Connectivity.</strong><br>
      The <a href="https://modelcontextprotocol.io" target="_blank" class="text-purple-500 hover:text-purple-600">Model Context Protocol (MCP)</a>
      is an open standard that allows AI agents to connect to data and tools. By configuring MCP servers here,
      you give Genie direct access to external systems—whether it's a local PostgreSQL database, a cloud service,
      or a proprietary internal API.<br><br>
      Genie supports both local (stdio) and remote (SSE/HTTP) MCP connections.
    subsections:
      - label: Server Configuration
        columns: [Key, Type, Description]
        rows:
          - ["name", "string", "Friendly name, e.g. `terraform-registry`"]
          - ["transport", "string", "`stdio` (local), `streamable_http`, or `sse` (remote)"]
          - ["command", "string", "Program to run (stdio only), e.g. `npx @org/mcp-server`"]
          - ["args", "string[]", "Extra command arguments"]
          - ["server_url", "string", "URL for HTTP/SSE transports"]
          - ["headers", "map", "Custom HTTP headers like `Authorization` (HTTP/SSE only)"]
          - ["env", "map", "Env vars for stdio subprocess. Values support `${VAR}` (resolved at runtime via secret provider). Use for tokens, e.g. <code>GITHUB_PERSONAL_ACCESS_TOKEN = \"${GH_TOKEN}\"</code>."]
          - ["include_tools", "string[]", "Allowlist — only use these tools"]
          - ["exclude_tools", "string[]", "Blocklist — block these tools"]
          - ["session_reconnect", "int", "Auto-reconnect retries (`0` = off)"]

  - id: web_search
    icon: "🔍"
    name: web_search
    sidebar_desc: Internet Research
    detail_title: "🔍 web_search"
    detail_desc: >
      <strong>Grounded Research & fast Fact-Checking.</strong><br>
      Give Genie the ability to browse the live web. This is critical for tasks that require up-to-date information,
      such as looking up recent documentation, checking library versions, or researching error messages.<br><br>
      Without web search, the model is limited to its training data cutoff. With it, Genie acts like a senior
      engineer with Google at their fingertips.
    tables:
      - columns: [Key, Type, Description]
        rows:
          - ["provider", "string", "`duckduckgo`", "Search engine: `duckduckgo` (default), `google`, or `bing`"]
          - ["google_api_key", "string", "Google Custom Search API key — use `${GOOGLE_API_KEY}`"]
          - ["google_cx", "string", "Custom Search Engine ID — controls which sites are searched"]
          - ["bing_api_key", "string", "Bing Search API key — use `${BING_API_KEY}`"]

  - id: vector_memory
    icon: "🧠"
    name: vector_memory
    sidebar_desc: Long-Term Memory
    detail_title: "🧠 vector_memory"
    detail_desc: >
      <strong>Long-Term Recall & Semantic Search.</strong><br>
      Vector memory allows Genie to "remember" things beyond the current conversation context window. By embedding
      text into vector space and storing it, Genie can semantically search for relevant past information—like
      architectural decisions, code snippets, or project guidelines—whenever it answers a new question.<br><br>
      Configure where these vectors are stored (persistence) and which model generates the embeddings.<br><br>
      <strong>Scalability:</strong> For small setups, use the default <code>inmemory</code> backend with
      <code>persistence_dir</code> to snapshot to disk. For large or multi-agent deployments (millions of vectors,
      high throughput), set <code>vector_store_provider = "milvus"</code> and configure <code>[vector_memory.milvus]</code>;
      Milvus is a dedicated vector database that scales horizontally and handles persistence itself.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["vector_store_provider", "string", "`inmemory`", "Backend: <code>inmemory</code> (default) or <code>milvus</code> (scalable). Milvus ignores persistence_dir"]
          - ["persistence_dir", "string", "—", "Where to save memory on disk (inmemory only; empty = ephemeral)"]
          - ["embedding_provider", "string", "`dummy`", "`openai` (best), `ollama` (local/free), or `dummy` (off)"]
          - ["api_key", "string", "—", "OpenAI API key (only when provider is `openai`)"]
          - ["ollama_url", "string", "—", "Ollama server URL, e.g. `http://localhost:11434`"]
          - ["ollama_model", "string", "—", "Embedding model, e.g. `nomic-embed-text`"]
          - ["allowed_metadata_keys", "string[]", "`[]`", "When set, only these keys are accepted in `memory_store` metadata and `memory_search` filter. Use for product/category bucket scoping. Empty = all keys allowed."]

  - id: graph
    icon: "🕸️"
    name: graph
    sidebar_desc: Knowledge Graph
    detail_title: "🕸️ graph"
    detail_desc: >
      <strong>Store and Query Entities & Relations.</strong><br>
      The knowledge graph lets Genie store people, repos, issues, and documents as entities and link them with
      relations (e.g. "Alice WORKED_ON issue-42"). Tools: <code>graph_store_entity</code>, <code>graph_store_relation</code>,
      <code>graph_query</code> (neighbors), <code>graph_get_entity</code>, and <code>graph_shortest_path</code>.<br><br>
      When enabled and <code>data_dir</code> is set, the in-memory implementation persists to that directory as
      <code>memory.bin.zst</code> (gob+zstd). Leave <code>data_dir</code> empty to keep the graph purely in-memory
      with no persistence across restarts.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["disabled", "bool", "`false`", "Set to true to turn off the knowledge graph and all graph_* tools"]
          - ["data_dir", "string", "—", "Directory for graph snapshot (memory.bin.zst). Empty = no persistence (in-memory only)"]

  - id: data_sources
    icon: "📂"
    name: data_sources
    sidebar_desc: Unified Data Sources
    detail_title: "📂 data_sources"
    detail_desc: >
      <strong>Index External Data into Vector Memory.</strong><br>
      Genie can sync items from Gmail, Google Drive, Slack, Linear, GitHub, and Calendar into its vector store
      so <code>memory_search</code> returns relevant past content. Enable and scope each source (e.g. folder IDs for Drive,
      label IDs for Gmail). Sync runs on a schedule in the background; last sync time is persisted for incremental updates.<br><br>
      Only items whose content or metadata matches at least one <code>search_keywords</code> term are embedded (up to 10 keywords).
      Leave <code>search_keywords</code> empty to index everything in scope. Currently <strong>Gmail</strong>, <strong>Google Drive</strong>,
      <strong>GitHub</strong>, and <strong>GitLab</strong> are wired for sync; Slack, Linear, and Calendar are planned.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["enabled", "bool", "`false`", "Master switch — when true, the sync job runs on the given interval"]
          - ["sync_interval", "duration", "`15m`", "How often to run the sync (e.g. `15m`, `1h`). Empty or zero = on-demand only"]
          - ["search_keywords", "string[]", "`[]`", "Only index items containing at least one of these terms (case-insensitive). Max 10. Empty = index all"]
      - columns: [Subsection, Description]
        rows:
          - ["[data_sources.gmail]", "Enable Gmail sync; set <code>label_ids</code> (e.g. <code>[\"INBOX\"]</code>). Uses email/Gmail credentials"]
          - ["[data_sources.gdrive]", "Enable Drive sync; set <code>folder_ids</code> (e.g. <code>[\"root\"]</code>). Uses [google_drive] credentials"]
          - ["[data_sources.github]", "Enable GitHub sync; set <code>repos</code> (e.g. <code>[\"owner/repo\"]</code>). Uses [scm] credentials (provider = github)"]
          - ["[data_sources.gitlab]", "Enable GitLab sync; set <code>repos</code> (e.g. <code>[\"group/project\"]</code>). Uses [scm] credentials (provider = gitlab)"]
          - ["[data_sources.calendar]", "Enable Calendar sync; set <code>calendar_ids</code>. Not yet wired in sync loop"]
          - ["[data_sources.slack]", "Planned — channel IDs. Not yet wired in sync loop"]
          - ["[data_sources.linear]", "Planned — team IDs. Not yet wired in sync loop"]

  - id: messenger
    icon: "💬"
    name: messenger
    sidebar_desc: Chat Apps
    detail_title: "💬 messenger"
    detail_desc: >
      <strong>ChatOps & Team Collaboration.</strong><br>
      Integrate Genie directly into where your team communicates. Instead of a separate web UI, your team can
      tag <code>@Genie</code> in Slack, Discord, or Teams to trigger workflows, ask questions, or debug incidents together.<br><br>
      This enables "Conversation as a Platform"—turning your chat history into a shared context for automation.
    subsections:
      - label: Common Settings
        columns: [Key, Type, Default, Description]
        rows:
          - ["platform", "string", "—", "Which chat app — `slack`, `discord`, `telegram`, `teams`, `googlechat`, `whatsapp`"]
          - ["buffer_size", "int", "`100`", "Message queue size before dropping"]
          - ["allowed_senders", "string[]", "`[]`", "Only respond to these sender IDs. Empty = all senders allowed. Supports prefix matching with `*` suffix (e.g. `91*` for all Indian numbers). For WhatsApp: use phone numbers without `+`."]
      - label: Slack
        columns: [Key, Description]
        rows:
          - ["slack.app_token", "App-Level Token (starts with `xapp-`)"]
          - ["slack.bot_token", "Bot User Token (starts with `xoxb-`)"]
      - label: Discord
        columns: [Key, Description]
        rows:
          - ["discord.bot_token", "Bot Token from Developer Portal"]
      - label: Telegram
        columns: [Key, Description]
        rows:
          - ['telegram.token', 'Token from <a href="https://t.me/BotFather" target="_blank" class="text-purple-500">@BotFather</a>']
      - label: Microsoft Teams
        columns: [Key, Description]
        rows:
          - ["teams.app_id", "Azure Bot App ID"]
          - ["teams.app_password", "Azure Bot secret/password"]
          - ["teams.listen_addr", "Webhook address (default `:3978`)"]
      - label: Google Chat
        columns: [Key, Description]
        rows:
          - ["googlechat.credentials_file", "Service account JSON path"]
          - ["googlechat.listen_addr", "Webhook address (default `:9876`)"]
      - label: WhatsApp
        columns: [Key, Description]
        rows:
          - ["whatsapp.store_path", "Local directory to store WhatsApp session data"]

  - id: browser
    icon: "🌐"
    name: browser
    sidebar_desc: Web Surfing
    detail_title: "🌐 browser"
    detail_desc: >
      <strong>Headless Browser Automation.</strong><br>
      Give Genie a pair of eyes and hands on the web. The browser integration allows the agent to navigate websites,
      click elements, fill forms, and read content. This is useful for end-to-end testing, scraping data from
      dynamic SPAs, or automating web-based workflows.<br><br>
      <strong>Safety First:</strong> Use the <code>blocked_domains</code> list to prevent the agent from wandering
      into sensitive areas (like production admin panels) or getting distracted by social media.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["blocked_domains", "string[]", "`[]`", "Domains the agent is forbidden from navigating to. Matching is suffix-based — `example.com` also blocks `sub.example.com`"]
    subsections:
      - label: Available Tools
        columns: [Tool, Description]
        rows:
          - ["`browser_navigate`", "Load a URL (respects blocklist)"]
          - ["`browser_click`", "Wait for & click a CSS-selected element"]
          - ["`browser_type`", "Clear & type text into an input"]
          - ["`browser_read_text`", "Extract visible text from an element"]
          - ["`browser_read_html`", "Extract outer HTML from an element"]
          - ["`browser_screenshot`", "Capture viewport or element as base64 PNG"]
          - ["`browser_eval_js`", "Evaluate arbitrary JavaScript"]
    code_example:
      label: Example YAML
      code: |
        browser:
          blocked_domains:
            - admin.internal.corp
            - payments.example.com
            - localhost

  - id: scm
    icon: "🐙"
    name: scm
    sidebar_desc: Code Storage (GitHub/GitLab)
    detail_title: "🐙 scm"
    detail_desc: >
      <strong>Source Code Intelligence.</strong><br>
      Connect Genie to your version control system (GitHub, GitLab, Bitbucket). This allows the agent to
      read repositories, search code, open pull requests, and review changes.<br><br>
      Essential for coding tasks, code reviews, and automating your PR workflows.
    tables:
      - columns: [Key, Type, Description]
        rows:
          - ["provider", "string", "`github`, `gitlab`, `bitbucket`"]
          - ["token", "string", "Personal Access Token (PAT)"]
          - ["base_url", "string", "API Base URL (for Enterprise instances)"]

  - id: pm
    icon: "📋"
    name: pm
    sidebar_desc: Task Trackers
    detail_title: "📋 pm"
    detail_desc: >
      <strong>Project Management Integration.</strong><br>
      Link Genie to your issue tracker (Jira, Linear, Asana). This enables the agent to read ticket details,
      update statuses, create new tasks, and summarize project progress.<br><br>
      Great for automating status reports or having Genie "work on ticket PROJ-123" by reading the requirements directly.
    tables:
      - columns: [Key, Type, Description]
        rows:
          - ["provider", "string", "`jira`, `linear`, `asana`"]
          - ["api_token", "string", "API Token for authentication"]
          - ["base_url", "string", "Instance URL (e.g. `https://mycompany.atlassian.net`)"]
          - ["email", "string", "Jira only — email address for Basic auth (used with API token)"]

  - id: enterprise
    icon: "🔌"
    name: enterprise
    sidebar_desc: Enterprise Connectors
    detail_title: "🔌 enterprise"
    detail_desc: >
      <strong>Built-In Enterprise Service Connectors.</strong><br>
      Genie ships with 7 SDK-backed connectors for popular enterprise services — all opt-in via config.
      Each connector is nested under <code>[enterprise]</code> and provides typed, production-ready
      tools for CRUD, search, and analytics. No boilerplate, no MCP setup required.<br><br>
      All connectors authenticate via environment variable references (<code>${VAR}</code>) and
      integrate with the Enterprise Secret Vault for cloud-native credential management.
    subsections:
      - label: "🔷 Atlassian (Jira + Confluence)"
        columns: [Key, Type, Description]
        rows:
          - ["base_url", "string", "Atlassian Cloud instance URL, e.g. `https://yourco.atlassian.net`"]
          - ["email", "string", "Account email for Basic auth"]
          - ["token", "string", "API token — use `${ATLASSIAN_API_TOKEN}` (create at id.atlassian.com)"]
      - label: Atlassian Tools
        columns: [Tool, Description]
        rows:
          - ["`jira_search`", "Search Jira issues with JQL"]
          - ["`jira_get_issue`", "Get full issue details by key"]
          - ["`jira_create_issue`", "Create a new issue (project, summary, type)"]
          - ["`jira_update_issue`", "Update issue fields (summary, description, assignee)"]
          - ["`jira_transition_issue`", "Move issue through workflow (e.g. To Do → In Progress → Done)"]
          - ["`jira_add_comment`", "Add a comment to an issue"]
          - ["`confluence_search`", "Search Confluence pages with CQL"]
          - ["`confluence_get_page`", "Get page content by ID"]
      - label: "☁️ Salesforce"
        columns: [Key, Type, Description]
        rows:
          - ["instance_url", "string", "Salesforce org URL, e.g. `https://yourco.my.salesforce.com`"]
          - ["token", "string", "Direct access token — `${SALESFORCE_TOKEN}` (preferred)"]
          - ["client_id", "string", "OAuth2 Client ID (alternative to direct token)"]
          - ["client_secret", "string", "OAuth2 Client Secret — `${SALESFORCE_CLIENT_SECRET}`"]
      - label: Salesforce Tools
        columns: [Tool, Description]
        rows:
          - ["`salesforce_query`", "Execute SOQL queries"]
          - ["`salesforce_get_record`", "Get a record by SObject type and ID"]
          - ["`salesforce_create_record`", "Create a new SObject record"]
          - ["`salesforce_update_record`", "Update fields on an existing record"]
          - ["`salesforce_delete_record`", "Delete a record by ID"]
          - ["`salesforce_describe`", "Describe SObject metadata (fields, types, relationships)"]
      - label: "🟠 HubSpot"
        columns: [Key, Type, Description]
        rows:
          - ["token", "string", "Private App access token — `${HUBSPOT_TOKEN}` (create in Settings > Integrations)"]
      - label: HubSpot Tools
        columns: [Tool, Description]
        rows:
          - ["`hubspot_get_contact`", "Get a contact by ID"]
          - ["`hubspot_create_contact`", "Create a new contact"]
          - ["`hubspot_update_contact`", "Update contact properties"]
          - ["`hubspot_search_contacts`", "Search contacts by query"]
          - ["`hubspot_get_company`", "Get a company by ID"]
          - ["`hubspot_create_company`", "Create a new company"]
          - ["`hubspot_get_deal`", "Get a deal by ID"]
          - ["`hubspot_create_deal`", "Create a new deal"]
          - ["`hubspot_list_pipelines`", "List all deal pipelines and stages"]
      - label: "❄️ Snowflake"
        columns: [Key, Type, Description]
        rows:
          - ["account", "string", "Snowflake account identifier, e.g. `abc12345.us-east-1`"]
          - ["user", "string", "Snowflake username"]
          - ["password", "string", "Password — `${SNOWFLAKE_PASSWORD}`"]
          - ["database", "string", "Default database to query"]
          - ["warehouse", "string", "Compute warehouse to use"]
          - ["role", "string", "Snowflake role (optional)"]
      - label: Snowflake Tools
        columns: [Tool, Description]
        rows:
          - ["`snowflake_query`", "Execute SQL queries and return results"]
          - ["`snowflake_list_databases`", "List available databases"]
          - ["`snowflake_list_schemas`", "List schemas in a database"]
          - ["`snowflake_list_tables`", "List tables in a schema"]
          - ["`snowflake_describe_table`", "Describe table columns and types"]
      - label: "💬 Slack Tools"
        columns: [Key, Type, Description]
        rows:
          - ["bot_token", "string", "Slack Bot Token (`xoxb-...`) — `${SLACK_BOT_TOKEN}`. Needs `channels:read`, `chat:write` scopes."]
      - label: Slack Tools (Agent Tools)
        columns: [Tool, Description]
        rows:
          - ["`slack_search`", "Search messages across channels"]
