# ═══════════════════════════════════════════════════════════
# TAB 1: CONFIGURATION  (master-detail sidebar)
# ═══════════════════════════════════════════════════════════
config_sections:
  - id: model_config
    icon: "🤖"
    name: model_config
    sidebar_desc: Brain Power & Routing
    detail_title: "🤖 model_config"
    detail_desc: >
      Configure the AI brains (models) Genie uses. Genie automatically picks the
      best brain for each specific task.
    tables:
      - columns: [Key, Type, Description]
        rows:
          - ["provider", "string", "AI provider — `openai`, `gemini`, or `anthropic`"]
          - ["model_name", "string", "Specific model, e.g. `gpt-5.2`, `gemini-3-flash-preview`, `claude-sonnet-4.5`"]
          - ["variant", "string", "Usually `default` — use `azure` for Azure-hosted OpenAI"]
          - ["token", "string", "API key — use `${OPENAI_API_KEY}` to read from environment"]
          - ["good_for_task", "string", "What this model excels at: `planning`, `tool_calling`, `efficiency`, `scientific_reasoning`"]

  - id: agui
    icon: "🖥️"
    name: agui
    sidebar_desc: Web UI Server
    detail_title: "🖥️ agui"
    detail_desc: >
      Configure the built-in web server that powers the Genie UI.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["port", "int", "`8080`", "Port to listen on"]
          - ["cors_origins", "string[]", '`["https://appcd-dev.github.io"]`', "Allowed CORS origins for the web UI"]
          - ["rate_limit", "float", "`0.5`", "Requests per second limit per IP"]
          - ["rate_burst", "int", "`3`", "Burst request allowance"]
          - ["max_concurrent", "int", "`5`", "Max concurrent requests processing"]
          - ["max_body_bytes", "int", "`1048576`", "Max request body size in bytes (1MB)"]



  - id: skills_roots
    icon: "🎯"
    name: skills_roots
    sidebar_desc: Teaching Genie New Tricks
    detail_title: "🎯 skills_roots"
    detail_desc: >
      Skills are like expansion packs that teach Genie how to do new things.
      See <a href="https://agentskills.io" target="_blank" class="text-purple-500 hover:text-purple-600">agentskills.io</a>.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["skills_roots", "string[]", '`["./skills"]`', "Directories or HTTPS URLs containing skill definitions"]

  - id: mcp
    icon: "🔌"
    name: mcp
    sidebar_desc: Connecting External Tools
    detail_title: "🔌 mcp"
    detail_desc: >
      Connect Genie to external tools and data sources, whether they are on your computer or in the cloud
      using the Model Context Protocol (MCP).
    subsections:
      - label: Server Configuration
        columns: [Key, Type, Description]
        rows:
          - ["name", "string", "Friendly name, e.g. `terraform-registry`"]
          - ["transport", "string", "`stdio` (local), `streamable_http`, or `sse` (remote)"]
          - ["command", "string", "Program to run (stdio only), e.g. `npx @org/mcp-server`"]
          - ["args", "string[]", "Extra command arguments"]
          - ["server_url", "string", "URL for HTTP/SSE transports"]
          - ["headers", "map", "Custom HTTP headers like `Authorization`"]
          - ["include_tools", "string[]", "Whitelist — only use these tools"]
          - ["exclude_tools", "string[]", "Blacklist — block these tools"]
          - ["session_reconnect", "int", "Auto-reconnect retries (`0` = off)"]
      - label: Retry Configuration
        columns: [Key, Type, Default, Description]
        rows:
          - ["timeout", "duration", "`10s`", "Connection timeout"]
          - ["max_retries", "int", "`2`", "Retry count (0–10)"]
          - ["initial_backoff", "duration", "`500ms`", "Wait before first retry"]
          - ["backoff_factor", "float", "`2.0`", "Exponential backoff multiplier"]
          - ["max_backoff", "duration", "`8s`", "Max wait between retries"]

  - id: web_search
    icon: "🔍"
    name: web_search
    sidebar_desc: Internet Research
    detail_title: "🔍 web_search"
    detail_desc: >
      Allows Genie to search the web for documentation and answers, just like a human developer.
    tables:
      - columns: [Key, Type, Description]
        rows:
          - ["provider", "string", "`duckduckgo`", "Search engine: `duckduckgo` (default), `google`, or `bing`"]
          - ["google_api_key", "string", "Google Custom Search API key — use `${GOOGLE_API_KEY}`"]
          - ["google_cx", "string", "Custom Search Engine ID — controls which sites are searched"]
          - ["bing_api_key", "string", "Bing Search API key — use `${BING_API_KEY}`"]

  - id: vector_memory
    icon: "🧠"
    name: vector_memory
    sidebar_desc: Long-Term Memory
    detail_title: "🧠 vector_memory"
    detail_desc: >
      Gives Genie long-term memory so it can learn from past conversations and get smarter over time.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["persistence_dir", "string", "—", "Where to save memory on disk (empty = in-memory only)"]
          - ["embedding_provider", "string", "`dummy`", "`openai` (best), `ollama` (local/free), or `dummy` (off)"]
          - ["api_key", "string", "—", "OpenAI API key (only when provider is `openai`)"]
          - ["ollama_url", "string", "—", "Ollama server URL, e.g. `http://localhost:11434`"]
          - ["ollama_model", "string", "—", "Embedding model, e.g. `nomic-embed-text`"]

  - id: messenger
    icon: "💬"
    name: messenger
    sidebar_desc: Chat Apps
    detail_title: "💬 messenger"
    detail_desc: >
      Connect Genie to your team's favorite chat apps like Slack, Discord, or Teams.
    subsections:
      - label: Common Settings
        columns: [Key, Type, Default, Description]
        rows:
          - ["platform", "string", "—", "Which chat app — `slack`, `discord`, `telegram`, `teams`, `googlechat`, `whatsapp`"]
          - ["buffer_size", "int", "`100`", "Message queue size before dropping"]
      - label: Slack
        columns: [Key, Description]
        rows:
          - ["slack.app_token", "App-Level Token (starts with `xapp-`)"]
          - ["slack.bot_token", "Bot User Token (starts with `xoxb-`)"]
      - label: Discord
        columns: [Key, Description]
        rows:
          - ["discord.bot_token", "Bot Token from Developer Portal"]
      - label: Telegram
        columns: [Key, Description]
        rows:
          - ['telegram.token', 'Token from <a href="https://t.me/BotFather" target="_blank" class="text-purple-500">@BotFather</a>']
      - label: Microsoft Teams
        columns: [Key, Description]
        rows:
          - ["teams.app_id", "Azure Bot App ID"]
          - ["teams.app_password", "Azure Bot secret/password"]
          - ["teams.listen_addr", "Webhook address (default `:3978`)"]
      - label: Google Chat
        columns: [Key, Description]
        rows:
          - ["googlechat.credentials_file", "Service account JSON path"]
          - ["googlechat.listen_addr", "Webhook address (default `:8080`)"]
      - label: WhatsApp
        columns: [Key, Description]
        rows:
          - ["whatsapp.store_path", "Local directory to store WhatsApp session data"]

  - id: browser
    icon: "🌐"
    name: browser
    sidebar_desc: Web Surfing
    detail_title: "🌐 browser"
    detail_desc: >
      Gives Genie a web browser to navigate sites, click buttons, and read pages—safely
      controlled by you.
      Provides 7 composable tools: navigate, click, type, read text, read HTML,
      screenshot, and eval JS. Use the blocklist to restrict which domains the
      agent is allowed to visit.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["blocked_domains", "string[]", "`[]`", "Domains the agent is forbidden from navigating to. Matching is suffix-based — `example.com` also blocks `sub.example.com`"]
    subsections:
      - label: Available Tools
        columns: [Tool, Description]
        rows:
          - ["`browser_navigate`", "Load a URL (respects blocklist)"]
          - ["`browser_click`", "Wait for & click a CSS-selected element"]
          - ["`browser_type`", "Clear & type text into an input"]
          - ["`browser_read_text`", "Extract visible text from an element"]
          - ["`browser_read_html`", "Extract outer HTML from an element"]
          - ["`browser_screenshot`", "Capture viewport or element as base64 PNG"]
          - ["`browser_eval_js`", "Evaluate arbitrary JavaScript"]
    code_example:
      label: Example YAML
      code: |
        browser:
          blocked_domains:
            - admin.internal.corp
            - payments.example.com
            - localhost

  - id: scm
    icon: "🐙"
    name: scm
    sidebar_desc: Code Storage (GitHub/GitLab)
    detail_title: "🐙 scm"
    detail_desc: >
      Connect to where your code lives, like GitHub, GitLab, or Bitbucket.
    tables:
      - columns: [Key, Type, Description]
        rows:
          - ["provider", "string", "`github`, `gitlab`, `bitbucket`"]
          - ["token", "string", "Personal Access Token (PAT)"]
          - ["base_url", "string", "API Base URL (for Enterprise instances)"]

  - id: pm
    icon: "📋"
    name: pm
    sidebar_desc: Task Trackers
    detail_title: "📋 pm"
    detail_desc: >
      Connect to project management tools like Jira or Linear to read and update tickets.
    tables:
      - columns: [Key, Type, Description]
        rows:
          - ["provider", "string", "`jira`, `linear`, `asana`"]
          - ["api_token", "string", "API Token for authentication"]
          - ["base_url", "string", "Instance URL (e.g. `https://mycompany.atlassian.net`)"]
          - ["email", "string", "Jira only — email address for Basic auth (used with API token)"]

  - id: email
    icon: "📧"
    name: email
    sidebar_desc: Email Integration
    detail_title: "📧 email"
    detail_desc: >
      Allow Genie to send and receive emails.
    tables:
      - columns: [Key, Type, Description]
        rows:
          - ["provider", "string", "`smtp`", "Only `smtp` is currently supported"]
          - ["host", "string", "SMTP Host (e.g. `smtp.gmail.com`)"]
          - ["port", "int", "SMTP Port (e.g. `587`)"]
          - ["imap_host", "string", "IMAP Host (for reading emails)"]
          - ["imap_port", "int", "IMAP Port (e.g. `993`)"]
          - ["username", "string", "Email username"]
          - ["password", "string", "Email password or App Password"]

  - id: hitl
    icon: "👮"
    name: hitl
    sidebar_desc: Human Approval
    detail_title: "👮 hitl"
    detail_desc: >
      Safety guardrails. Require explicit human permission before Genie performs sensitive
      actions like deleting files or browsing the web.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["read_only_tools", "string[]", "`[]`", "List of tools that trigger an approval request, e.g. `['browser_click', 'run_command']`. Use `['*']` to require approval for <strong>all</strong> tools."]

# ═══════════════════════════════════════════════════════════
# TAB 2: HOW-TO
# ═══════════════════════════════════════════════════════════
howto_guides:
  - step: 1
    title: Getting Started
    desc: Install Genie and run your first command in under a minute.
    code: |
      # Install via Homebrew
      brew install stackgenhq/homebrew-stackgen/genie

      # Or run via Docker
      docker run --rm -it \
        -v ~/.genie.toml:/root/.genie.toml \
        -v $(pwd):/workspace \
        ghcr.io/stackgenhq/genie:latest grant

      # Grant your first wish
      genie grant

  - step: 2
    title: Setting Up Models
    desc: Configure multi-model routing so Genie picks the best brain for each task.
    code: |
      # .genie.toml
      [[model_config]]
      provider = "openai"
      model_name = "gpt-5.2"
      token = "${OPENAI_API_KEY}"
      good_for_task = "planning"

      [[model_config]]
      provider = "gemini"
      model_name = "gemini-3-flash-preview"
      token = "${GEMINI_API_KEY}"
      good_for_task = "tool_calling"

  - step: 3
    title: Adding Skills
    desc: >
      Create reusable capability packs that teach Genie new tricks. Based on the
      <a href="https://agentskills.io" target="_blank" class="text-purple-500 hover:text-purple-600">agentskills.io</a> spec.
    code: |
      # 1. Create a skill directory
      mkdir -p skills/my-skill

      # 2. Add a SKILL.md with frontmatter
      cat > skills/my-skill/SKILL.md <<EOF
      ---
      name: my-skill
      description: What this skill does
      ---
      # My Skill
      Instructions here...
      EOF

      # 3. Configure in .genie.toml
      skills_roots = ["./skills"]

  - step: 4
    title: Connecting MCP Tools
    desc: Extend Genie with external tool servers via the Model Context Protocol.
    code: |
      # Local stdio server
      [[mcp]]
      name = "terraform-registry"
      transport = "stdio"
      command = "npx"
      args = ["@anthropic/mcp-tf"]

      # Remote HTTP server
      [[mcp]]
      name = "cloud-tools"
      transport = "streamable_http"
      server_url = "https://mcp.example.com"
      [mcp.headers]
      Authorization = "${MCP_TOKEN}"

  - step: 5
    title: Chat Platform Setup
    desc: >
      Wire Genie into Slack, Discord, Telegram, Teams, Google Chat, or WhatsApp so your team can
      interact directly.
    code: |
      # Example: Slack (Socket Mode)
      [messenger]
      platform = "slack"
      buffer_size = 100

      [messenger.slack]
      app_token = "${SLACK_APP_TOKEN}"
      bot_token = "${SLACK_BOT_TOKEN}"

      # Steps:
      # 1. Create app at api.slack.com/apps
      # 2. Enable Socket Mode
      # 3. Add bot scopes: chat:write
      # 4. Install to your workspace

  - step: 6
    title: Using Environment Variables
    desc: >
      Keep API keys and secrets out of your config files using the <code>${ENV_VAR}</code> pattern.
    code: |
      # In .genie.toml — reference env vars
      [[model_config]]
      token = "${OPENAI_API_KEY}"

      [messenger.slack]
      app_token = "${SLACK_APP_TOKEN}"

      # Load from a .env file before running
      set -a && source .env && set +a
      genie grant

