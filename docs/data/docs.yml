  - id: hitl
    icon: "👮"
    name: hitl
    sidebar_desc: Human Approval
    detail_title: "👮 hitl"
    detail_desc: >
      <strong>Enterprise Safety Guardrails.</strong><br>
      Human-in-the-Loop (HITL) policies ensure that the agent never goes rogue. You can define a list of
      "sensitive tools" (like `delete_file`, `deploy_prod`, or `send_email`) that always require explicit
      human approval before execution.<br><br>
      When the agent tries to use a restricted tool, it pauses and waits for you to click "Approve" or "Reject".
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["always_allowed", "string[]", "`[]`", "Tools that skip human approval (read-only/safe operations), e.g. `['read_file', 'list_file']`. Supports prefix wildcards like `browser_*`. Use `['*']` to auto-approve <strong>all</strong> tools (disables HITL)."]
          - ["denied_tools", "string[]", "`[]`", "Tools the agent is completely forbidden from using — calls are rejected immediately with an error. Supports prefix wildcards like `browser_*`. Use `['*']` to block <strong>all</strong> tools."]
          - ["cache_ttl", "duration", "—", "How long an approved tool+args combination stays auto-approved. After this duration the same call requires fresh human approval. Example: `10m`."]

  - id: toolwrap
    icon: "🔧"
    name: toolwrap
    sidebar_desc: Tool Middleware Pipeline
    detail_title: "🔧 toolwrap"
    detail_desc: >
      <strong>Production-Grade Middleware for Every Tool Call.</strong><br>
      Every tool call in Genie flows through a composable middleware pipeline — the same
      <code>func(next) next</code> pattern used in HTTP servers. The pipeline provides
      <strong>context compression</strong> (local BM25-based chunk scoring — no LLM call),
      <strong>resilience</strong> (rate limiting, circuit breaking, retries, concurrency control),
      <strong>observability</strong> (OpenTelemetry metrics &amp; tracing), and
      <strong>security</strong> (output sanitization, input validation, HITL approval) — all
      configurable via YAML/TOML with zero code changes.<br><br>
      <strong>Context Mode</strong> is <em>enabled by default</em> and runs before the LLM summariser.
      It chunks large tool outputs, scores them against the tool's input using BM25-lite, and returns
      only the top-K most relevant chunks — saving tokens and API cost without any LLM call.<br><br>
      Core middlewares (context mode, panic recovery, loop detection, caching, HITL, audit) are always active.
      Opt-in middlewares are enabled individually via their <code>enabled</code> flag.
      Backed by battle-tested libraries: <code>golang.org/x/time/rate</code>,
      <code>golang.org/x/sync/semaphore</code>, <code>sony/gobreaker/v2</code>,
      and <code>cenkalti/backoff/v4</code>.
    subsections:
      - label: Middleware Execution Order
        columns: [Position, Middleware, Type, Purpose]
        rows:
          - ["1", "`ContextMode`", "On by default", "BM25 chunk scoring — compresses large tool output locally (no LLM). Disable with `context_mode.disabled = true`"]
          - ["2", "`PanicRecovery`", "Always-on", "Catches panics, prevents crash"]
          - ["3", "`Tracing`", "Opt-in", "OpenTelemetry spans per tool call"]
          - ["4", "`Metrics`", "Opt-in", "OTel counters + latency histogram"]
          - ["5", "`Emitter`", "Always-on", "Streams responses to the UI"]
          - ["6", "`Logger`", "Always-on", "Structured logging (debug/error)"]
          - ["7", "`Audit`", "Always-on", "Audit trail for compliance"]
          - ["8", "`Timeout`", "Opt-in", "Per-tool execution deadlines"]
          - ["9", "`RateLimit`", "Opt-in", "Token-bucket rate limiting"]
          - ["10", "`CircuitBreaker`", "Opt-in", "Three-state circuit (closed → open → half-open)"]
          - ["11", "`Concurrency`", "Opt-in", "Weighted semaphore limiting"]
          - ["12", "`Retry`", "Opt-in", "Exponential backoff with jitter"]
          - ["13", "`LoopDetection`", "Always-on", "Blocks identical consecutive calls and cancels sub-agents after 3 consecutive empty results from retrieval tools (`memory_search`, `graph_query`, `graph_get_entity`, `graph_shortest_path`)"]
          - ["14", "`FailureLimit`", "Always-on", "Blocks tool after 3 consecutive failures"]
          - ["15", "`SemanticCache`", "Always-on", "Deduplicates idempotent calls (TTL-based)"]
          - ["16", "`Validation`", "Opt-in", "JSON schema validation on input args"]
          - ["17", "`Sanitize`", "Opt-in", "Redacts secrets from tool output"]
          - ["18", "`HITLApproval`", "Always-on", "Human approval gate for sensitive tools"]
          - ["19", "`ContextEnrich`", "Always-on", "Injects thread/run IDs into context"]
      - label: Context Mode Configuration
        columns: [Key, Type, Default, Description]
        rows:
          - ["context_mode.disabled", "bool", "`false`", "Set to `true` to turn off local BM25 compression. Enabled by default."]
          - ["context_mode.threshold", "int", "`20000`", "Character count above which responses are compressed (≈ 5k tokens)"]
          - ["context_mode.max_chunks", "int", "`10`", "Maximum number of top-scored chunks returned"]
          - ["context_mode.chunk_size", "int", "`800`", "Target character count per chunk (split on paragraph boundaries)"]
          - ["context_mode.min_term_len", "int", "`3`", "Minimum character length for BM25 query terms. Lower values keep short IDs like pod hashes."]
          - ["context_mode.per_tool.<name>", "table", "—", "Per-tool overrides for `threshold`, `max_chunks`, `chunk_size`, `min_term_len`. Non-zero values override globals."]
      - label: Resilience Configuration
        columns: [Key, Type, Default, Description]
        rows:
          - ["timeout.enabled", "bool", "`false`", "Enable per-tool timeout enforcement"]
          - ["timeout.default", "duration", "`30s`", "Default timeout for all tools"]
          - ["timeout.per_tool", "map[string]duration", "`{}`", "Tool-specific overrides, e.g. `execute_code: 120s`"]
          - ["rate_limit.enabled", "bool", "`false`", "Enable token-bucket rate limiting"]
          - ["rate_limit.global_rate_per_minute", "float", "`60`", "Global calls per minute across all tools"]
          - ["rate_limit.per_tool_rate_per_minute", "map[string]float", "`{}`", "Per-tool rate limits"]
          - ["circuit_breaker.enabled", "bool", "`false`", "Enable per-tool circuit breakers"]
          - ["circuit_breaker.failure_threshold", "int", "`5`", "Failures before circuit opens"]
          - ["circuit_breaker.open_duration", "duration", "`30s`", "Cooldown before half-open probe"]
          - ["concurrency.enabled", "bool", "`false`", "Enable weighted concurrency semaphore"]
          - ["concurrency.global_limit", "int", "`10`", "Max simultaneous tool executions"]
          - ["concurrency.per_tool_limits", "map[string]int", "`{}`", "Per-tool concurrency caps"]
          - ["retry.enabled", "bool", "`false`", "Enable automatic retry with backoff"]
          - ["retry.max_attempts", "int", "`3`", "Total attempts (including first call)"]
          - ["retry.initial_backoff", "duration", "`500ms`", "Wait before first retry"]
          - ["retry.max_backoff", "duration", "`10s`", "Maximum backoff cap"]
      - label: Observability Configuration
        columns: [Key, Type, Default, Description]
        rows:
          - ["metrics.enabled", "bool", "`false`", "Emit OTel metrics: call count, latency histogram, error count"]
          - ["metrics.prefix", "string", "`tools`", "Metric name prefix, e.g. `myapp.tools.call.count`"]
          - ["tracing.enabled", "bool", "`false`", "Create OTel spans per tool call with tool name and arg size"]
      - label: Security Configuration
        columns: [Key, Type, Default, Description]
        rows:
          - ["sanitize.enabled", "bool", "`false`", "Enable output sanitization (secret scrubbing)"]
          - ["sanitize.replacement", "string", "`[REDACTED]`", "Replacement text for redacted values"]
          - ["sanitize.per_tool", "map[string]string[]", "`{}`", "Tool-specific patterns to redact (case-insensitive)"]
          - ["validation.enabled", "bool", "`false`", "Validate tool args against declared JSON schema"]
      - label: Key Features
        columns: [Feature, Detail]
        rows:
          - ["Context Mode (on by default)", "Large tool outputs are chunked and BM25-scored against the tool's input — only the top-K most relevant chunks are kept. No LLM call, no API cost. Saves tokens and avoids hitting the summariser."]
          - ["Zero-config defaults", "Core middlewares run out of the box — no configuration needed for context mode, panic recovery, loop detection, caching, audit, and HITL"]
          - ["Config-driven", "Enable any opt-in middleware with a single `enabled = true` — no code changes, no recompilation"]
          - ["Composable", "Mix and match middlewares, or build custom chains with `CompositeMiddleware`"]
          - ["Per-tool granularity", "Timeout, rate limit, concurrency, circuit breaker, context mode, and sanitize all support per-tool overrides"]
          - ["Battle-tested libraries", "Rate limiting via `x/time/rate`, semaphores via `x/sync/semaphore`, circuit breaking via `sony/gobreaker`, retries via `cenkalti/backoff`"]
          - ["Observable", "OpenTelemetry metrics and tracing integrate with Datadog, Grafana, Jaeger, or any OTel-compatible backend"]
    code_example:
      label: Example TOML
      code: |
        [toolwrap]

        # Context Mode — enabled by default.
        # Compresses large tool output using BM25 chunk scoring (no LLM call).
        # Uncomment to disable or tune:
        # [toolwrap.context_mode]
        # disabled = true          # set true to turn off
        # threshold = 20000        # chars above which compression kicks in
        # max_chunks = 10          # top-K chunks to keep
        # chunk_size = 800         # target chars per chunk
        # min_term_len = 3         # min chars for BM25 query terms
        # [toolwrap.context_mode.per_tool.run_shell]
        # threshold = 40000        # higher threshold for shell output
        # max_chunks = 15
        # min_term_len = 2         # keep short pod IDs / commit SHAs

        # Resilience
        [toolwrap.timeout]
        enabled = true
        default = "30s"
        [toolwrap.timeout.per_tool]
        execute_code = "120s"
        web_search = "15s"

        [toolwrap.rate_limit]
        enabled = true
        global_rate_per_minute = 60
        [toolwrap.rate_limit.per_tool_rate_per_minute]
        web_search = 10

        [toolwrap.circuit_breaker]
        enabled = true
        failure_threshold = 5
        open_duration = "30s"

        [toolwrap.concurrency]
        enabled = true
        global_limit = 10
        [toolwrap.concurrency.per_tool_limits]
        web_search = 3

        [toolwrap.retry]
        enabled = true
        max_attempts = 3
        initial_backoff = "500ms"
        max_backoff = "10s"

        # Observability
        [toolwrap.metrics]
        enabled = true
        prefix = "genie.tools"

        [toolwrap.tracing]
        enabled = true

        # Security
        [toolwrap.sanitize]
        enabled = true
        replacement = "[REDACTED]"
        [toolwrap.sanitize.per_tool]
        read_file = ["API_KEY", "password", "secret"]
        execute_code = ["token"]

  - id: security
    icon: "🔐"
    name: security
    sidebar_desc: Enterprise Secret Vault
    detail_title: "🔐 security"
    detail_desc: >
      <strong>Zero-Trust Secret Management.</strong><br>
      Eliminate hardcoded API keys and plaintext environment variables. Genie's enterprise security layer
      resolves secrets at runtime from <strong>GCP Secret Manager</strong>, <strong>AWS Secrets Manager</strong>,
      <strong>Azure Key Vault</strong>, <strong>HashiCorp Vault</strong>, etcd, or file-based stores —
      with automatic fallback to <code>os.Getenv</code> for local development and backward compatibility.<br><br>
      Built on <a href="https://gocloud.dev/howto/runtimevar/" target="_blank" class="text-purple-500 hover:text-purple-600">gocloud.dev/runtimevar</a>,
      secrets are lazily loaded, cached, and thread-safe. Your credentials never touch config files or source control.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["secrets", "map[string]string", "`{}`", "Maps secret names to runtimevar URLs, e.g. `OPENAI_API_KEY = 'gcpsecretmanager://projects/p/secrets/s?decoder=string'`"]
    subsections:
      - label: Supported Backends
        columns: [Backend, URL Scheme, Example]
        rows:
          - ["GCP Secret Manager", "`gcpsecretmanager://`", "`gcpsecretmanager://projects/p/secrets/s?decoder=string`"]
          - ["AWS Secrets Manager", "`awssecretsmanager://`", "`awssecretsmanager://my-secret?region=us-east-1&decoder=string`"]
          - ["AWS Parameter Store", "`awsparamstore://`", "`awsparamstore://my-param?region=us-east-1&decoder=string`"]
          - ["Azure Key Vault", "`azurekeyvault://`", "`azurekeyvault://vault.vault.azure.net/secrets/name?decoder=string`"]
          - ["HashiCorp Vault", "via runtimevar driver", "Configurable via third-party runtimevar driver"]
          - ["etcd", "`etcd://`", "`etcd://my-key?decoder=string`"]
          - ["File (watched)", "`file://`", "`file:///etc/secrets/api-key?decoder=string`"]
          - ["Constant (testing)", "`constant://`", "`constant://?val=test-value&decoder=string`"]
      - label: Key Features
        columns: [Feature, Detail]
        rows:
          - ["Zero-config fallback", "Without any `[security]` section, all secrets resolve from environment variables"]
          - ["Lazy loading", "runtimevar connections are opened on first access and cached for subsequent calls"]
          - ["Thread-safe", "Double-checked locking with `sync.RWMutex` for concurrent access"]
          - ["Testable", "counterfeiter-generated fakes for easy mocking in unit tests"]
          - ["Cloud-agnostic", "Powered by Go CDK — switch backends by changing a URL, zero code changes"]
      - label: Device Keyring & back-to-bottle
        columns: [Topic, Detail]
        rows:
          - ["keyring:// URLs", "Secrets can be stored in the system keychain (macOS Keychain, Windows Credential Manager, Linux Secret Service). Use <code>keyring://genie/ACCOUNT_NAME</code> in <code>[security.secrets]</code>. The setup wizard can store API keys and tokens in the keyring so config files stay clean."]
          - ["genie back-to-bottle", "CLI command to remove all Genie entries from the keyring (e.g. <code>genie back-to-bottle</code>). Use when resetting credentials or before handing off a machine. Config files are not modified."]
    code_example:
      label: Example TOML
      code: |
        # Map secret names to cloud secret store URLs.
        # Any secret NOT listed here falls back to os.Getenv.
        [security.secrets]
        OPENAI_API_KEY    = "gcpsecretmanager://projects/my-project/secrets/openai-key?decoder=string"
        ANTHROPIC_API_KEY = "awssecretsmanager://anthropic-key?region=us-east-1&decoder=string"
        LANGFUSE_SECRET   = "azurekeyvault://my-vault.vault.azure.net/secrets/langfuse?decoder=string"

        # For local dev, just set env vars — no config changes needed.
        # export OPENAI_API_KEY="sk-..."

  - id: pii
    icon: "🛡️"
    name: pii
    sidebar_desc: PII Redaction
    detail_title: "🛡️ pii"
    detail_desc: >
      <strong>Automatic Secret & PII Scrubbing.</strong><br>
      Before any data reaches memory or the vector store, Genie's PII redaction layer automatically detects and
      replaces sensitive information — API keys, passwords, tokens, credit card numbers, and high-entropy secrets —
      with deterministic HMAC hashes like <code>[HIDDEN:a1b2c3]</code>.<br><br>
      Powered by <a href="https://github.com/aragossa/pii-shield" target="_blank" class="text-purple-500 hover:text-purple-600">pii-shield</a>,
      detection goes beyond simple regex: it uses <strong>Shannon entropy analysis</strong>, <strong>English bigram scoring</strong>,
      <strong>Luhn credit card validation</strong>, and <strong>context-aware key detection</strong> to catch both known
      patterns and novel random-looking secrets that regex would miss.<br><br>
      <strong>Zero-config by default</strong> — works out of the box with sensible defaults. Tune the threshold only
      if you need more or less aggressive detection.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["salt", "string", "— (random)", "HMAC key for deterministic hashing. Same input + same salt = same `[HIDDEN:hash]`. Set a stable value for log correlation across restarts."]
          - ["entropy_threshold", "float", "`3.6`", "Shannon entropy score above which tokens are treated as secrets. Lower = more aggressive (2.0), higher = more permissive (5.0)."]
          - ["min_secret_length", "int", "`6`", "Tokens shorter than this are never redacted (unless they are values of sensitive keys)."]
          - ["sensitive_keys", "string[]", "`[pass, secret, token, ...]`", "Key names whose values are always redacted regardless of entropy. Case-insensitive."]
          - ["custom_regexes", "array", "`[]`", "Custom regex patterns for deterministic detection. Each entry has `pattern` and `name`."]
          - ["safe_regexes", "array", "`[]`", "Allowlist patterns — matching tokens are never redacted, even if high-entropy."]
    subsections:
      - label: Detection Methods
        columns: [Method, What It Catches]
        rows:
          - ["Shannon Entropy", "Random-looking strings (API keys, tokens, hex secrets) that exceed the entropy threshold"]
          - ["Bigram Analysis", "Distinguishes English words from random strings using letter-pair frequency scoring"]
          - ["Context-Aware Keys", "Values of keys like `password=`, `secret:`, `token=` are redacted regardless of entropy"]
          - ["Luhn Validation", "Credit card numbers verified with the Luhn checksum algorithm (not just digit patterns)"]
          - ["Custom Regex", "User-defined patterns for domain-specific secrets (e.g. internal ticket IDs, advisory codes)"]
          - ["Safe Regex", "Allowlist patterns that prevent false positives (e.g. version strings, build hashes)"]
      - label: Key Features
        columns: [Feature, Detail]
        rows:
          - ["Zero-config", "Works out of the box — no configuration needed for standard PII detection"]
          - ["Deterministic hashing", "Same input always produces same `[HIDDEN:hash]` output, enabling log correlation"]
          - ["Pre-storage scrubbing", "Applied automatically before `storeConversation` and `storeAccomplishment`"]
          - ["No external dependencies", "Pure Go, stdlib-only — no cloud APIs, network calls, or NLP models required"]
          - ["High performance", "Sync.Pool-based zero-alloc tokenizer, compiled regex cache, stack-allocated buffers"]
    code_example:
      label: Example TOML
      code: |
        [pii]
        # Stable salt for deterministic hashing across restarts
        salt = "my-team-correlation-salt-2026"

        # Tune sensitivity (default 3.6 works for most cases)
        entropy_threshold = 3.6
        min_secret_length = 6

        # Add domain-specific sensitive keys
        sensitive_keys = ["pass", "secret", "token", "key", "ssn", "cvv"]

        # Custom regex for internal patterns
        [[pii.custom_regexes]]
        pattern = '\bGHSA-[A-Za-z0-9-]+\b'
        name = "github_advisory"

        # Allowlist version strings (prevent false positives)
        [[pii.safe_regexes]]
        pattern = 'v\d+\.\d+\.\d+'
        name = "semver"

  - id: pensieve
    icon: "🧠"
    name: disable_pensieve
    sidebar_desc: Context Self-Management
    detail_title: "🧠 disable_pensieve"
    detail_desc: >
      <strong>The Agent Controls Its Own Memory.</strong><br>
      Inspired by the <a href="https://arxiv.org/abs/2602.12108" target="_blank" class="text-purple-500 hover:text-purple-600">Pensieve Paradigm (StateLM)</a>,
      these tools let Genie actively manage its own context window — pruning processed events,
      checking remaining budget, and maintaining persistent notes that survive context pruning.<br><br>
      When enabled, the agent uses a <strong>sawtooth pattern</strong>: ingest information, distill key
      insights into notes, then prune the raw context to free up space. This lets the agent reason
      over inputs far larger than the context window.<br><br>
      <strong>Enabled by default</strong> — to disable, set <code>disable_pensieve = true</code> in your config.
      Destructive tools (<code>delete_context</code>, <code>note</code>) require
      <strong>Human-in-the-Loop approval</strong> by default.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["disable_pensieve", "bool", "`false`", "If `true`, this disables the Pensieve context tools. Defaults to `false` (enabled)."]
    subsections:
      - label: Available Tools
        columns: [Tool, HITL Required, Description]
        rows:
          - ["`delete_context`", "✅ Yes", "Soft-mask specific events from visible context. Events are preserved for audit but hidden from the LLM. Use after extracting key info into notes."]
          - ["`check_budget`", "❌ No", "Report context budget — total events, visible events, and masked events. The agent uses this to decide when to prune."]
          - ["`note`", "✅ Yes", "Save a persistent note by key. Notes survive context pruning (stored in session state, not event stream). Overwrite by re-using the same key."]
          - ["`read_notes`", "❌ No", "List all saved notes as a key→content map. Use to recall distilled information after pruning raw context."]
      - label: How It Works
        columns: [Phase, What Happens]
        rows:
          - ["1. Ingest", "Agent receives a large document or long conversation history"]
          - ["2. Distill", "Agent calls `note` to save key findings, plans, or intermediate results"]
          - ["3. Prune", "Agent calls `delete_context` to remove the raw events it already processed"]
          - ["4. Continue", "Agent works with compact context (notes + remaining events), repeating as needed"]
    code_example:
      label: Example TOML
      code: |
        # Disable Pensieve context self-management
        disable_pensieve = true

        # HITL config: delete_context and note require approval by default.
        # check_budget and read_notes are auto-approved (read-only).
        # To auto-approve all Pensieve tools (not recommended):
        # [hitl]
        # always_allowed = ["delete_context", "note"]

  - id: langfuse
    icon: "🪢"
    name: langfuse
    sidebar_desc: Observability & Tracing
    detail_title: "🪢 langfuse"
    detail_desc: >
      <strong>Deep Observability & Debugging.</strong><br>
      Langfuse provides open-source observability and analytics for LLM applications. By enabling this integration,
      Genie will trace every agent run, tool call, and reasoning step, sending detailed telemetry to your Langfuse dashboard.<br><br>
      Use this to debug complex agent behaviors, analyze costs, and manage prompt versions.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["public_key", "string", "—", "Langfuse Public Key (use `${LANGFUSE_PUBLIC_KEY}`)"]
          - ["secret_key", "string", "—", "Langfuse Secret Key (use `${LANGFUSE_SECRET_KEY}`)"]
          - ["host", "string", "`https://cloud.langfuse.com`", "Langfuse API host (change for self-hosted)"]
          - ["enable_prompts", "bool", "`false`", "If true, Genie fetches prompt templates from Langfuse instead of using built-ins"]

  - id: cron
    icon: "⏰"
    name: cron
    sidebar_desc: Scheduled Tasks
    detail_title: "⏰ cron"
    detail_desc: >
      <strong>Recurring Scheduled Tasks.</strong><br>
      Cron lets Genie execute actions on a schedule — health checks, status reports, cache warming,
      or any prompt you'd like repeated at regular intervals. Tasks are persisted in the database so
      they survive restarts, and a background polling scheduler dispatches due tasks through the same
      pipeline as webhooks and heartbeats.<br><br>
      Define tasks in your config for static schedules, or use the <code>create_recurring_task</code>
      tool to let the agent dynamically create new recurring tasks at runtime.
    tables:
      - columns: [Key, Type, Default, Description]
        rows:
          - ["enabled", "bool", "`false`", "Master switch — set to `true` to activate the scheduler"]
    subsections:
      - label: Task Definition
        columns: [Key, Type, Description]
        rows:
          - ["name", "string", "Unique task name (used as the upsert key)"]
          - ["expression", "string", "Standard 5-field cron expression, e.g. `*/5 * * * *`"]
          - ["action", "string", "The prompt sent to the Genie agent on each execution"]
      - label: Runtime Tool
        columns: [Tool, Description]
        rows:
          - ["`create_recurring_task`", "Lets the agent dynamically create recurring tasks via LLM tool call"]
    code_example:
      label: Example TOML
      code: |
        [cron]
        enabled = true
        failure_threshold = 5

        [[cron.tasks]]
        name = "daily-standup-summary"
        expression = "0 9 * * 1-5"    # 9 AM weekdays
        action = "Summarize yesterday's git commits and open PRs"

        [[cron.tasks]]
        name = "health-check"
        expression = "*/10 * * * *"   # every 10 minutes
        action = "Check cluster health and report any anomalies"

# ═══════════════════════════════════════════════════════════
# TAB 2: HOW-TO
# ═══════════════════════════════════════════════════════════
howto_guides:
  - step: 1
    title: Getting Started
    desc: Install Genie and run your first command in under a minute.
    code: |
      # ── Homebrew (macOS / Linux) ──
      brew install stackgenhq/homebrew-stackgen/genie

      # ── Go install ──
      CGO_ENABLED=1 go install -mod=mod github.com/stackgenhq/genie@latest

      # ── Build from source ──
      git clone https://github.com/stackgenhq/genie.git
      cd genie
      make build    # binary at build/genie

      # ── Docker ──
      docker run --rm -it \
        -v ~/.genie.toml:/root/.genie.toml \
        -v $(pwd):/workspace \
        ghcr.io/stackgenhq/genie:latest grant

      # ── GitHub Releases ──
      # Download from: https://github.com/stackgenhq/genie/releases

      # ── Windows (Scoop) ──
      # scoop bucket add stackgen https://github.com/stackgenhq/homebrew-stackgen
      # scoop install genie

      # Grant your first wish
      genie grant

  - step: 2
    title: Setting Up Models
    desc: Configure multi-model routing so Genie picks the best brain for each task.
    code: |
      # .genie.toml
      [[model_config]]
      provider = "openai"
      model_name = "gpt-5.2"
      token = "${OPENAI_API_KEY}"
      good_for_task = "planning"

      [[model_config]]
      provider = "gemini"
      model_name = "gemini-3-flash-preview"
      token = "${GEMINI_API_KEY}"
      good_for_task = "tool_calling"

  - step: 3
    title: Adding Skills
    desc: >
      Create reusable capability packs that teach Genie new tricks. Based on the
      <a href="https://agentskills.io" target="_blank" class="text-purple-500 hover:text-purple-600">agentskills.io</a> spec.
    code: |
      # 1. Create a skill directory
      mkdir -p skills/my-skill

      # 2. Add a SKILL.md with frontmatter
      cat > skills/my-skill/SKILL.md <<EOF
      ---
      name: my-skill
      description: What this skill does
      ---
      # My Skill
      Instructions here...
      EOF

      # 3. Configure in .genie.toml
      skills_roots = ["./skills"]

  - step: 4
    title: Connecting MCP Tools
    desc: >
      Extend Genie with external tool servers via the Model Context Protocol.
      Run <code>genie doctor</code> to validate MCP (and the rest of your config) after editing.
    code: |
      # Local stdio server
      [[mcp.servers]]
      name = "terraform-registry"
      transport = "stdio"
      command = "npx"
      args = ["@anthropic/mcp-tf"]

      # GitHub MCP with token from env (use [mcp.servers.env] and set GH_TOKEN)
      # [[mcp.servers]]
      # name = "github"
      # transport = "stdio"
      # command = "npx"
      # args = ["-y", "@anthropic/github-mcp-server"]
      # [mcp.servers.env]
      # GITHUB_PERSONAL_ACCESS_TOKEN = "${GH_TOKEN}"

      # Remote HTTP server
      [[mcp.servers]]
      name = "cloud-tools"
      transport = "streamable_http"
      server_url = "https://mcp.example.com"
      [mcp.servers.headers]
      Authorization = "${MCP_TOKEN}"

  - step: 5
    title: Chat Platform Setup
    desc: >
      Wire Genie into Slack, Discord, Telegram, Teams, Google Chat, or WhatsApp so your team can
      interact directly. When Human-in-the-Loop (HITL) approval is enabled, each platform shows
      tool arguments using its native rich formatting — Block Kit in Slack, Adaptive Cards in Teams,
      Cards v2 in Google Chat, and structured text elsewhere.
    code: |
      # ─── Slack (Socket Mode — recommended) ────────────────
      # 1. Create a Slack app at https://api.slack.com/apps
      # 2. Enable Socket Mode (Settings → Socket Mode → Toggle On)
      # 3. Generate an App-Level Token (xapp-...) with connections:write
      # 4. Add Bot Token Scopes: chat:write, app_mentions:read, im:history
      # 5. Install the app to your workspace
      # 6. Copy the Bot User Token (xoxb-...)

      [messenger]
      platform = "slack"

      [messenger.slack]
      app_token = "${SLACK_APP_TOKEN}"    # xapp-...
      bot_token = "${SLACK_BOT_TOKEN}"    # xoxb-...

      # Genie sends HITL approvals as Slack Block Kit messages
      # with formatted code blocks and Approve/Reject/Revisit buttons.

      # ─── Discord ──────────────────────────────────────────
      # 1. Create an application at https://discord.com/developers
      # 2. Add a Bot under the Bot tab
      # 3. Enable Message Content Intent
      # 4. Copy the Bot Token
      # 5. Invite bot with: OAuth2 → URL Generator → bot (Send Messages)

      [messenger]
      platform = "discord"

      [messenger.discord]
      bot_token = "${DISCORD_BOT_TOKEN}"

      # ─── Telegram ─────────────────────────────────────────
      # 1. Message @BotFather on Telegram
      # 2. /newbot → follow prompts → copy the token

      [messenger]
      platform = "telegram"

      [messenger.telegram]
      token = "${TELEGRAM_BOT_TOKEN}"

      # ─── Microsoft Teams ──────────────────────────────────
      # 1. Register a Bot at https://dev.botframework.com
      # 2. Create an Azure Bot resource (or App Registration)
      # 3. Note the App ID and generate a client secret
      # 4. Configure the messaging endpoint to point to Genie

      [messenger]
      platform = "teams"

      [messenger.teams]
      app_id = "${TEAMS_APP_ID}"
      app_password = "${TEAMS_APP_PASSWORD}"
      listen_addr = ":3978"              # webhook endpoint

      # Genie sends HITL approvals as Adaptive Cards with
      # formatted arguments and styled action buttons.

      # ─── Google Chat ──────────────────────────────────────
      # 1. Create a Google Cloud project
      # 2. Enable the Google Chat API
      # 3. Create a Service Account and download the JSON key
      # 4. Configure the Chat app in the API console

      [messenger]
      platform = "googlechat"

      [messenger.googlechat]
      credentials_file = "/path/to/service-account.json"
      listen_addr = ":9876"              # webhook endpoint

      # Genie sends HITL approvals as Cards v2 with headers,
      # code-formatted arguments, and instructional footers.

      # ─── WhatsApp ─────────────────────────────────────────
      # 1. Uses the whatsmeow library (no Meta Cloud API needed)
      # 2. On first run, scan the QR code to link your device
      # 3. Session is persisted to store_path for reconnection

      [messenger]
      platform = "whatsapp"
      allowed_senders = ["15551234567"]  # optional allowlist

  - step: 6
    title: Setting Up Cron Tasks
    desc: >
      Schedule recurring tasks that Genie executes automatically — great for daily reports,
      periodic health checks, or cache maintenance.
    code: |
      # .genie.toml
      [cron]
      enabled = true

      [[cron.tasks]]
      name = "morning-digest"
      expression = "0 9 * * 1-5"          # 9 AM weekdays
      action = "Summarize overnight alerts and open PRs"

      [[cron.tasks]]
      name = "dependency-check"
      expression = "0 0 * * 0"            # Sunday midnight
      action = "Audit npm and go.mod for outdated dependencies"

      # The agent can also create tasks dynamically:
      # "Create a recurring task to check disk usage every hour"
      # → uses the create_recurring_task tool

  - step: 7
    title: Enterprise Secret Management
    desc: >
      Eliminate hardcoded credentials with cloud-native secret resolution.
      Genie's <code>[security]</code> section maps secret names to
      <a href="https://gocloud.dev/howto/runtimevar/" target="_blank" class="text-purple-500 hover:text-purple-600">Go CDK runtimevar</a>
      URLs — supporting GCP, AWS, Azure, and more. Unmapped secrets
      automatically fall back to environment variables.
    code: |
      # .genie.toml — enterprise secret management

      # Map secrets to cloud providers
      [security.secrets]
      OPENAI_API_KEY    = "gcpsecretmanager://projects/prod/secrets/openai?decoder=string"
      ANTHROPIC_API_KEY = "awssecretsmanager://anthropic-prod?region=us-east-1&decoder=string"
      LANGFUSE_SECRET   = "azurekeyvault://vault.vault.azure.net/secrets/langfuse?decoder=string"

      # For local development — just use env vars (no config needed)
      # export OPENAI_API_KEY="sk-..."
      # export ANTHROPIC_API_KEY="sk-ant-..."
      genie grant

  - step: 8
    title: Using Environment Variables
    desc: >
      For simpler setups, keep API keys out of config files using <code>${ENV_VAR}</code> interpolation.
      This is the zero-config approach that works everywhere.
    code: |
      # In .genie.toml — reference env vars
      [[model_config]]
      token = "${OPENAI_API_KEY}"

      [messenger.slack]
      app_token = "${SLACK_APP_TOKEN}"

      # Load from a .env file before running
      set -a && source .env && set +a
      genie grant

  - step: 9
    title: What Genie can do — sources & content
    desc: >
      Genie can pull in and work with several kinds of content so you can summarize, research, and get answers from real sources.<br><br>
      <strong>Supported today:</strong><br>
      • <strong>YouTube</strong> — Ask to “transcribe this YouTube video” or “summarize this video.” Genie uses the <code>youtube_transcript</code> tool to fetch captions (when available) and then summarize or answer questions.<br>
      • <strong>Web pages & articles</strong> — “Summarize this article: [URL]” or “What does this page say?” Genie uses <code>web_fetch</code> and <code>http_request</code> to read URLs and return text.<br>
      • <strong>Documents</strong> — PDFs, DOCX, CSV, and text files (when the agent has a file path, e.g. from attachments or workspace). Use <code>parse_document</code> for extraction.<br>
      • <strong>Search</strong> — “Research [topic] and summarize.” Genie uses <code>web_search</code> to find and synthesize information.<br><br>
      <strong>Possible later:</strong> Podcasts (RSS + show notes or transcript APIs), newsletters (via email or URL), and more. If you need a specific source type, say what you’re trying to do and we can extend tools or docs.
    code: |
      # Example prompts to try in the chat:
      # "Transcribe and summarize this YouTube video: https://www.youtube.com/watch?v=..."
      # "Summarize this article: https://example.com/post"
      # "Research best practices for X and give me key takeaways"
      # "Summarize the key points of this document"  (with a file attached or path in context)

# ═══════════════════════════════════════════════════════════
# TAB 3: ARCHITECTURE
# ═══════════════════════════════════════════════════════════
architecture:
  title: Architecture & Internals

  overview:
    title: System Overview
    desc: >
      Genie is built from three core subsystems. Requests arrive through any
      messenger adapter (browser, Slack, WhatsApp, etc.) and flow through the
      same pipeline to the LLM and back.
    diagram: |
      ┌─────────┐              ┌─────────────────────────┐  Chat()  ┌────────────────┐  Run()  ┌──────────────────┐
      │ Browser │─── POST / ──▶│                         │────────▶│  CodeOwner      │───────▶│  ReAcTree Engine  │
      │ (SSE)   │◀── events ───│  Messenger Adapter      │◀────────│  pkg/codeowner  │◀───────│  pkg/reactree     │
      └─────────┘              │  pkg/messenger/agui     │ events  │                │ result │                    │
      ┌─────────┐              │  pkg/messenger/slack    │         │  • Classify    │        │  • Sequence        │
      │  Slack  │◀─ Socket ──▶│  pkg/messenger/whatsapp │          │  • Memory      │        │  • Fallback        │
      │  Teams  │  Mode/API   │  pkg/messenger/discord  │          │  • ReAcTree    │        │  • Parallel        │
      │WhatsApp │              │  pkg/messenger/teams    │         │  • Persona.md   │        │  • Adaptive loop   │
      │  etc.   │              │  ...                    │         │                │        │                    │
      └─────────┘              └─────────────────────────┘         └────────────────┘        └──────────────────┘

  subsystems:
    - title: "🖥️ AG-UI Server (pkg/messenger/agui)"
      desc: >
        HTTP server implementing the
        <a href="https://docs.ag-ui.com" target="_blank" class="text-purple-500 hover:text-purple-600">AG-UI protocol</a>.
        Accepts a POST with RunAgentInput, streams events back as SSE, and provides
        DDoS protection (per-IP rate limiting, concurrency semaphore, max body size).
        This is one of several messenger adapters — all share the same
        <code>messenger.Messenger</code> interface for Connect/Disconnect/Send/Receive.
      columns: [Component, File, Purpose]
      rows:
        - ["`Server`", "`server.go`", "HTTP server, chi router, handleRun, CORS, graceful shutdown"]
        - ["`SSEWriter`", "`sse.go`", "Writes `event: TYPE\\ndata: JSON\\n\\n` with auto-flush"]
        - ["`MapEvent`", "`event_mapper.go`", "Converts internal events → AG-UI wire JSON"]
        - ["`EventAdapter`", "`event_adapter.go`", "Converts trpc-agent-go `*event.Event` → typed TUI messages"]
        - ["`BackgroundWorker`", "`server.go`", "Worker pool for event-driven agent runs (webhooks, heartbeats, cron)"]
        - ["`ipRateLimiter`", "`ratelimit.go`", "Per-IP token-bucket rate limiting middleware"]
        - ["Dedup filter", "`server_expert.go`", "Suppresses multi-stage text replays via cumulative content tracking"]

    - title: "⏰ Cron Scheduler (pkg/cron)"
      desc: >
        DB-polling cron scheduler that checks every minute for tasks whose <code>NextRunAt</code> has
        passed. Dispatches due tasks through the <code>BackgroundWorker</code> pipeline, records execution
        history, and computes the next run time. The database is the single source of truth, making the
        scheduler naturally restart-safe.
      columns: [Component, File, Purpose]
      rows:
        - ["`Scheduler`", "`scheduler.go`", "Ticker loop, dispatch gating with mutex, health checks"]
        - ["`Store`", "`store.go`", "GORM-backed persistence for tasks and history (SQLite/Postgres)"]
        - ["`createRecurringTaskTool`", "`tool.go`", "LLM tool for dynamic task creation at runtime"]
        - ["`CleanupHistory`", "`store.go`", "Periodic pruning of old cron history entries"]
        - ["`HealthCheck`", "`scheduler.go`", "Aggregates recent failures per task for monitoring"]

    - title: "🧑‍💻 CodeOwner Expert (pkg/codeowner)"
      desc: >
        The primary agent orchestrator. Receives a user question, classifies it,
        recalls relevant conversation history, and delegates complex work to the
        ReAcTree engine.
      columns: [Step, Detail]
      rows:
        - ["1. Classify", "Front-desk expert (fast model) labels the request: `REFUSE`, `SALUTATION`, `OUT_OF_SCOPE`, or `COMPLEX`"]
        - ["2. Recall", "Search `memory.Service` for past turns relevant to the question (sender-scoped)"]
        - ["3. Execute", "For `COMPLEX` — run through the ReAcTree with working memory and tools"]
        - ["4. Store", "Persist the Q&A turn back into memory for future recall"]
        - ["5. Persona", "Load project-level coding standards from `persona_file` (default: `Agents.md`) and append to persona"]

    - title: "🔧 Tool Middleware Pipeline (pkg/toolwrap)"
      desc: >
        Every tool call flows through a composable middleware chain before execution.
        Provides resilience (rate limiting, circuit breaking, retries, concurrency control),
        observability (OTel metrics & tracing), and security (output sanitization, HITL approval).
        Core middlewares are always active; opt-in middlewares are config-driven.
      columns: [Layer, Middlewares, Libraries Used]
      rows:
        - ["Observability", "`TracingMiddleware`, `MetricsMiddleware`", "`go.opentelemetry.io/otel`"]
        - ["Core I/O", "`EmitterMiddleware`, `LoggerMiddleware`, `AuditMiddleware`", "Built-in"]
        - ["Resilience", "`TimeoutMiddleware`, `RateLimitMiddleware`, `CircuitBreakerMiddleware`, `ConcurrencyMiddleware`, `RetryMiddleware`", "`x/time/rate`, `x/sync/semaphore`, `sony/gobreaker/v2`, `cenkalti/backoff/v4`"]
        - ["Safety", "`LoopDetectionMiddleware`, `FailureLimitMiddleware`, `SemanticCacheMiddleware`", "Built-in"]
        - ["Security", "`InputValidationMiddleware`, `OutputSanitizationMiddleware`, `HITLApprovalMiddleware`", "Built-in"]
        - ["Context", "`ContextEnrichMiddleware`, `PanicRecoveryMiddleware`", "Built-in"]

    - title: "🌲 ReAcTree Engine (pkg/reactree)"
      desc: >
        Tree-structured reasoning engine inspired by the
        <a href="https://arxiv.org/abs/2310.03756" target="_blank" class="text-purple-500 hover:text-purple-600">ReAcTree paper</a>.
        Maps Behavior Tree semantics onto `trpc-agent-go` state graphs.
      columns: [Execution Mode, When Used, Behavior]
      rows:
        - ["`runSingleNode`", "No stages, no iterations", "Single root agent node — backward-compatible path"]
        - ["`runMultiStage`", "Stages configured", "Sequence graph; each stage is an agent node with its own instruction"]
        - ["`runAdaptiveLoop`", "`MaxIterations > 0`", "Iterative refinement loop over a single node"]

  event_types:
    title: AG-UI Event Types
    columns: [Event, Constant, Description]
    rows:
      - ["Run lifecycle", "`RUN_STARTED` / `RUN_FINISHED` / `RUN_ERROR`", "Marks the start, successful end, or failure of an agent run"]
      - ["Text streaming", "`TEXT_MESSAGE_START` / `TEXT_MESSAGE_CONTENT` / `TEXT_MESSAGE_END`", "Lifecycle of a streaming text message block"]
      - ["Reasoning", "`REASONING_MESSAGE_CONTENT`", "Chain-of-thought reasoning content (delta)"]
      - ["Tool calls", "`TOOL_CALL_START` / `TOOL_CALL_ARGS` / `TOOL_CALL_END` / `TOOL_CALL_RESULT`", "Full tool call lifecycle from invocation to result"]
      - ["Steps", "`STEP_STARTED` / `STEP_FINISHED`", "Multi-stage workflow progress"]
      - ["HITL", "`TOOL_APPROVAL_REQUEST`", "Requests human approval before executing a sensitive tool"]
      - ["Custom", "`CUSTOM`", "Log messages and other extensible events"]

  endpoints:
    title: API Endpoints
    columns: [Method, Path, Description]
    rows:
      - ["`POST`", "`/`", "AG-UI run endpoint — accepts `RunAgentInput`, streams SSE events"]
      - ["`POST`", "`/approve`", "HITL approval — resolve a pending tool call (approved/rejected)"]
      - ["`POST`", "`/api/v1/events`", "Event gateway — accepts webhook/heartbeat/cron events for background processing"]
      - ["`POST`", "`/api/v1/inject`", "Mid-run feedback — inject a user message into the agent's working memory while it is processing. Body: `{ threadId, message }`."]
      - ["`GET`", "`/api/v1/resume`", "Returns the agent's natural-language capability resume"]
      - ["`GET`", "`/api/v1/capabilities`", "Returns the current AI stance: <code>tool_names</code>, <code>always_allowed</code>, <code>denied_tools</code> (JSON). The chat UI uses this to show a collapsible “What Genie can do” panel."]
      - ["`GET`", "`/health`", "Health check — returns JSON with status, uptime, started_at, version, build_date, agent_name, and (when authenticated) user"]
      - ["`GET`", "`/api/v1/cron/tasks`", "List all cron tasks (planned)"]
      - ["`GET`", "`/api/v1/cron/history`", "View cron execution history (planned)"]

  debugging:
    title: Debugging Scenarios
    items:
      - title: No output in chat UI
        steps:
          - "Check that SSE headers are set (`Content-Type: text/event-stream`)"
          - "Verify `MapEvent()` does not return an error for the event type"
          - "Check the dedup filter in `server_expert.go` — it may be suppressing a replay"
      - title: Tool cards stuck spinning
        steps:
          - "Verify `EventAdapter.ConvertEvent()` produces `AgentToolResponseMsg` for tool responses"
          - "Check that `ToolCallID` matches between `TOOL_CALL_START` and `TOOL_CALL_RESULT`"
          - "Confirm the tool response event reaches `rawEventChan` (not dropped by channel full)"
      - title: HITL approval not working
        steps:
          - "Confirm `approvalStore` is not nil (HITL is disabled when nil)"
          - "Check that `/approve` endpoint is registered in the chi router"
          - "Verify the `approvalId` in the POST body matches the pending request"

  footer_note: "For full details, see `pkg/reactree/README.md` in the repository."

# ═══════════════════════════════════════════════════════════
# TAB 4: FAQ
# ═══════════════════════════════════════════════════════════
faq:
  - q: How can I create genie.toml without editing TOML?
    a: >
      Use the <strong>Config Builder</strong> — the guided way to create your first <code>.genie.toml</code> upfront.
      No TOML knowledge needed: fill in the form with sensible defaults and tooltips, then copy or download your config.
      It's the easiest way to onboard Genie. Open it from the docs nav or go to <a href="config-builder.html" class="text-purple-500 hover:text-purple-600">config-builder.html</a>.
  - q: Where can I get an API key for my AI provider?
    a: >
      Get your API key from your provider's dashboard: <strong>Anthropic</strong> <a href="https://platform.claude.com/settings/keys" target="_blank" class="text-purple-500 hover:text-purple-600">platform.claude.com/settings/keys</a>,
      <strong>Gemini</strong> <a href="https://aistudio.google.com/api-keys" target="_blank" class="text-purple-500 hover:text-purple-600">aistudio.google.com/api-keys</a>,
      <strong>OpenAI</strong> <a href="https://platform.openai.com/api-keys" target="_blank" class="text-purple-500 hover:text-purple-600">platform.openai.com/api-keys</a>.
      Use <code>${OPENAI_API_KEY}</code>, <code>${GEMINI_API_KEY}</code>, or <code>${ANTHROPIC_API_KEY}</code> in your config to read from the environment.
  - q: How is Genie different from other AI assistants?
    a: >
      Most assistants are "Personal AI" designed for open-ended chats. 
      <strong>Genie is an Enterprise Agentic Platform</strong> engineered for infrastructure and extensive coding workflows.
      It uses the <strong>ReAcTree</strong> engine for deterministic execution, includes built-in <strong>Security/Audit</strong> layers,
      and follows strict engineering standards (DDD, linting).

  - q: Which AI providers does Genie support?
    a: >
      Genie works with <strong>OpenAI</strong>, <strong>Google Gemini</strong>, and <strong>Anthropic Claude</strong>.
      Just set the <code>provider</code> in your config.

  - q: Can I use multiple models at once?
    a: >
      Yes! You can use different brains for different tasks. For example, use a smart model for planning
      and a fast model for writing code. Genie automatically switches to the best one for the job.

  - q: How do I keep API keys out of my config file?
    a: >
      Don't paste keys directly! Use <code>${ENV_VAR}</code> in your config for simple setups.
      For production, use the <code>[security.secrets]</code> section to resolve secrets from
      <strong>GCP Secret Manager</strong>, <strong>AWS Secrets Manager</strong>, or <strong>Azure Key Vault</strong>.
      Genie uses <a href="https://gocloud.dev/howto/runtimevar/" class="text-purple-500">Go CDK runtimevar</a>
      URLs — just change a URL to switch secret backends, zero code changes.

  - q: Does Genie support cloud secret stores?
    a: >
      Yes! Genie's enterprise security layer supports <strong>GCP Secret Manager</strong>,
      <strong>AWS Secrets Manager</strong>, <strong>AWS Parameter Store</strong>,
      <strong>Azure Key Vault</strong>, <strong>etcd</strong>, and file-based secrets.
      Add a <code>[security.secrets]</code> section to your config that maps secret names to
      runtimevar URLs. Any secret without a mapping automatically falls back to <code>os.Getenv</code>,
      so local development works with zero configuration.

  - q: What's the difference between Skills and MCP?
    a: >
      <strong>Skills</strong> are like plugins or expansion packs you install to teach Genie new tricks.<br><br>
      <strong>MCP</strong> is a standard way to connect specific tools (like a database or cloud service)
      so Genie can use them.

  - q: Does Genie work in CI/CD pipelines?
    a: >
      Yes. Genie can run in Docker, so you can easily add it to GitHub Actions, GitLab CI, or Jenkins pipelines.

  - q: How do I connect Slack, Discord, or Teams?
    a: >
      Just add a <code>[messenger]</code> section to your config file with your credentials.
      Check the "Chat Apps" tab for the exact fields you need.

  - q: Where does Genie store vector memory?
    a: >
      By default, it's just in computer memory (lost when you restart). You can configure it to save
      to your hard drive so Genie remembers things forever.

  - q: What is <code>good_for_task</code> and how does model routing work?
    a: >
      This setting tells Genie what each model is good at. For instance, you might want a "deep thinker"
      for planning but a "fast coder" for writing scripts. Genie routes tasks to the right brain automatically.

  - q: Can I run Genie in Docker?
    a: >
      Yes. Pull the official image: <code>docker pull ghcr.io/stackgenhq/genie:latest</code>. Mount
      your config and workspace as volumes:<br><br>
      <code>docker run --rm -it -v ~/.genie.toml:/root/.genie.toml -v $(pwd):/workspace ghcr.io/stackgenhq/genie:latest grant</code><br><br>
      Pass secrets via <code>-e</code> flags (e.g. <code>-e OPENAI_API_KEY=sk-...</code>) and use
      <code>${ENV_VAR}</code> in your config.

# ─────────────────────────────────────────────────────────────
# Troubleshooting: genie doctor error codes
# Run `genie doctor` to validate config, MCP, SCM, and secrets.
# Every problem includes an ErrCode; look it up below for resolution.
# ─────────────────────────────────────────────────────────────
troubleshooting:
  title: "Troubleshooting — genie doctor error codes"
  desc: >
    Run <code>genie doctor</code> to validate your configuration, MCP connections, SCM, and external secrets.
    Each reported problem includes an <strong>ErrCode</strong>. Use the table below to find the cause and how to fix it.
  error_codes:
    - code: GENIE_DOC_001
      section: config
      message: No config file found
      resolution: >
        Genie is using defaults. Create <code>.genie.toml</code> or <code>.genie.yaml</code> in your repo root or <code>$HOME</code>
        for full configuration. Copy from <code>config.toml.example</code> and customize.
    - code: GENIE_DOC_002
      section: config
      message: Config file read failed
      resolution: >
        The config file path could not be read. Check that the file exists, permissions are correct, and the path
        (or <code>--config</code>) is correct.
    - code: GENIE_DOC_003
      section: config
      message: Config parse error
      resolution: >
        The config file is not valid TOML or YAML. Check for syntax errors (missing brackets, indentation in YAML,
        invalid escape sequences). Use a linter or validator for the format.
    - code: GENIE_DOC_004
      section: config
      message: Unsupported config file extension
      resolution: >
        Only <code>.toml</code>, <code>.yaml</code>, and <code>.yml</code> are supported. Rename the file or use <code>--config</code>.
    - code: GENIE_DOC_010
      section: secrets
      message: Secret unavailable
      resolution: >
        A secret referenced in <code>[security.secrets]</code> could not be resolved. Check the runtimevar URL
        (GCP Secret Manager, AWS Secrets Manager, file path) and that the process has permission to read it.
    - code: GENIE_DOC_011
      section: secrets
      message: Secret manager initialization failed
      resolution: >
        The secret Manager (from <code>[security.secrets]</code>) could not be created. Verify runtimevar driver
        imports and that backend URLs are valid.
    - code: GENIE_DOC_012
      section: secrets
      message: Secret resolve failed
      resolution: >
        One or more secrets in <code>[security.secrets]</code> failed to resolve. Check the detail line for the
        secret name and URL; ensure the backend is reachable and the secret exists.
    - code: GENIE_DOC_020
      section: model_config
      message: No valid model providers
      resolution: >
        At least one LLM provider must be configured with a valid API key. Set one of <code>OPENAI_API_KEY</code>,
        <code>GEMINI_API_KEY</code>, <code>GOOGLE_API_KEY</code>, or <code>ANTHROPIC_API_KEY</code> in the environment,
        or configure <code>[[model_config.providers]]</code> with a <code>token</code> (or <code>${VAR}</code>).
    - code: GENIE_DOC_021
      section: model_config
      message: Model provider missing token
      resolution: >
        A configured provider (OpenAI, Gemini, Anthropic, HuggingFace) requires an API token when not self-hosted.
        Set the <code>token</code> field or the corresponding env var; or use <code>[security.secrets]</code>.
    - code: GENIE_DOC_022
      section: model_config
      message: Model provider validation error
      resolution: >
        Model config validation failed. Check the detail for the exact error; fix provider name, model name,
        token, or host in <code>[model_config.providers]</code>.
    - code: GENIE_DOC_030
      section: mcp
      message: MCP configuration invalid
      resolution: >
        The <code>[mcp.servers]</code> section has a validation error (e.g. missing <code>name</code>, <code>transport</code>,
        or <code>command</code> / <code>server_url</code> depending on transport). See the detail and the MCP config docs.
    - code: GENIE_DOC_031
      section: mcp
      message: MCP server connection failed
      resolution: >
        Genie could not connect to this MCP server (stdio subprocess or HTTP/SSE). Ensure the command is in PATH
        (e.g. <code>npx</code> for Node-based servers), the server URL is reachable, and any required env (e.g.
        <code>GITHUB_PERSONAL_ACCESS_TOKEN</code>) is set or in <code>[mcp.servers.env]</code>.
    - code: GENIE_DOC_032
      section: mcp
      message: MCP initialize failed
      resolution: >
        The MCP handshake (Initialize) failed. The server may be incompatible or misconfigured. Check server logs.
    - code: GENIE_DOC_033
      section: mcp
      message: MCP list tools failed
      resolution: >
        Listing tools from the MCP server failed. Ensure the server implements the MCP protocol correctly.
    - code: GENIE_DOC_040
      section: scm
      message: SCM not configured
      resolution: >
        No SCM provider is configured. To use GitHub/GitLab/Bitbucket tools, add <code>[scm]</code> with
        <code>provider</code> and <code>token</code> (or <code>${SCM_TOKEN}</code>).
    - code: GENIE_DOC_041
      section: scm
      message: SCM provider invalid
      resolution: >
        The <code>provider</code> in <code>[scm]</code> must be one of <code>github</code>, <code>gitlab</code>, <code>bitbucket</code>.
    - code: GENIE_DOC_042
      section: scm
      message: SCM token missing
      resolution: >
        <code>[scm]</code> is configured but <code>token</code> is empty. Set a Personal Access Token (PAT) or
        use <code>token = \"${SCM_TOKEN}\"</code> and export <code>SCM_TOKEN</code> (or <code>GITHUB_TOKEN</code> for GitHub).
    - code: GENIE_DOC_043
      section: scm
      message: SCM client init failed
      resolution: >
        The SCM client could not be created. Check the detail for the underlying error (e.g. invalid base_url).
    - code: GENIE_DOC_044
      section: scm
      message: SCM connection validation failed
      resolution: >
        The SCM token or endpoint failed the health check (e.g. listing repos). Verify the token has the required
        scopes and the API URL (or default) is reachable.
    - code: GENIE_DOC_050
      section: messenger
      message: Messenger configuration invalid
      resolution: >
        The <code>[messenger]</code> section has invalid or missing fields for the chosen platform. Check the
        platform-specific keys (e.g. Slack <code>app_token</code>, <code>bot_token</code>) and that tokens match
        expected prefixes (e.g. <code>xapp-</code>, <code>xoxb-</code>).
    - code: GENIE_DOC_051
      section: messenger
      message: Messenger secret missing
      resolution: >
        A token or credential required for the configured messenger platform is empty. Set the corresponding
        env var or config field (see messenger config docs).
    - code: GENIE_DOC_060
      section: web_search
      message: Web search configuration invalid
      resolution: >
        The <code>[web_search]</code> section is invalid (e.g. provider not supported, or Google/Bing chosen
        without API key). Set <code>provider</code> to <code>duckduckgo</code> for no key, or provide <code>google_api_key</code> / <code>bing_api_key</code>.

